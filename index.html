<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AMIAR KEMPF | SCUDERIA VELOCITY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Barlow+Condensed:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ferrari-red: #cc0000;
            --carbon: #111111;
            --gold: #ffcf40;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Barlow Condensed', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--carbon); color: var(--white); height: 100vh; overflow: hidden;
            background-image: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        /* --- RENN-ATMOSPHÄRE --- */
        .track-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(204, 0, 0, 0.2) 0%, transparent 70%);
            z-index: -1;
        }

        .app-container {
            width: 100%; max-width: 450px; height: 100vh; margin: 0 auto;
            display: flex; flex-direction: column; position: relative;
        }

        /* --- HEADER --- */
        .header { padding: 60px 30px 20px; border-bottom: 3px solid var(--ferrari-red); background: rgba(0,0,0,0.5); }
        .logo-area { display: flex; align-items: center; justify-content: space-between; }
        .brand { font-family: 'Barlow Condensed'; font-style: italic; font-weight: 900; font-size: 2rem; letter-spacing: -1px; }
        .brand span { color: var(--ferrari-red); }
        .race-tag { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--gold); letter-spacing: 3px; }

        /* --- TACHOMETER (HUD) --- */
        .dashboard {
            padding: 20px; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, rgba(204,0,0,0.1), transparent);
        }
        .speedo {
            width: 180px; height: 180px; border: 4px solid #222; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; border-top-color: var(--ferrari-red);
            box-shadow: 0 0 30px rgba(204, 0, 0, 0.2);
        }
        .speed-num { font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; line-height: 1; }
        .unit { font-size: 0.8rem; color: var(--ferrari-red); letter-spacing: 2px; }

        /* --- SCREENS --- */
        .screen { display: none; flex: 1; padding: 30px; flex-direction: column; justify-content: center; }
        .active { display: flex; animation: driftIn 0.6s ease-out; }
        @keyframes driftIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- CARDS & BUTTONS --- */
        .race-card {
            background: var(--glass); border-left: 5px solid var(--ferrari-red);
            padding: 25px; border-radius: 4px; margin-bottom: 20px;
        }

        .btn-drive {
            background: var(--ferrari-red); color: white; border: none; padding: 20px;
            font-size: 1.2rem; font-weight: 900; font-style: italic; text-transform: uppercase;
            cursor: pointer; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: 0.3s;
        }
        .btn-drive:active { transform: scale(0.95); filter: brightness(1.2); }

        /* --- RENNSPIEL LOGIK UI --- */
        .question { font-size: 1.6rem; font-weight: 900; font-style: italic; margin-bottom: 30px; line-height: 1.1; }
        .answer-grid { display: grid; gap: 15px; }
        .answer-opt {
            background: rgba(255,255,255,0.05); padding: 20px; border: 1px solid #333;
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .answer-opt:hover { background: var(--white); color: black; }

        /* --- FOOTER --- */
        .footer-credits {
            text-align: center; padding: 20px; font-size: 0.7rem; color: #555;
            letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="track-bg"></div>

<div class="app-container">
    <header class="header">
        <div class="logo-area">
            <div class="brand">AMIAR <span>KEMPF</span></div>
            <div class="race-tag">SCUDERIA V12</div>
        </div>
    </header>

    <div class="dashboard">
        <div class="speedo">
            <span class="unit">GESCHWINDIGKEIT</span>
            <span class="speed-num" id="speed-display">000</span>
            <span class="unit">KM/H</span>
        </div>
    </div>

    <div id="screen-home" class="screen active">
        <div class="race-card">
            <h2 style="font-size: 2rem; margin-bottom: 10px;">BEREIT ZUM START?</h2>
            <p style="opacity: 0.6;">Drücke auf Zündung, um das Rennen gegen die Zeit zu beginnen. Nur die Elite erreicht das Podium.</p>
        </div>
        <button class="btn-drive" onclick="startRace()">MOTOR STARTEN</button>
    </div>

    <div id="screen-race" class="screen">
        <div id="game-engine">
            <h2 class="question" id="q-text">Initialisiere Renn-Daten...</h2>
            <div class="answer-grid" id="answer-box"></div>
        </div>

        <div id="feedback" style="display:none; text-align:center;">
            <h1 id="fb-title" style="font-size: 3rem; font-style: italic; margin-bottom: 10px;"></h1>
            <p id="fb-desc" style="opacity: 0.6; margin-bottom: 40px;"></p>
            <button class="btn-drive" style="width: 100%;" onclick="nextLap()">NÄCHSTE RUNDE</button>
        </div>
    </div>

    <div id="screen-leader" class="screen">
        <div class="race-card" style="text-align: center;">
            <h3 style="color: var(--gold); letter-spacing: 3px;">ZIELGERADE ERREICHT</h3>
            <h1 style="font-size: 4rem; font-style: italic;" id="final-speed">0</h1>
            <p style="opacity: 0.5;">DEINE TOP-SPEED IM RENNKURS</p>
        </div>
        <button class="btn-drive" onclick="location.reload()">NEUER VERSUCH</button>
    </div>

    <footer class="footer-credits">
        Produziert von Wowa & Amiar Kempf
    </footer>
</div>

<script>
    const RENN_DATEN = [
        { q: "Welcher Ferrari Motor ist legendär?", o: ["V6 Hybrid", "V12 Saugmotor", "W16 Quad", "4-Zylinder"], c: 1, e: "Der V12 ist die Seele von Ferrari." },
        { q: "Was bedeutet 'Rosso Corsa'?", o: ["Rote Kurve", "Renn-Rot", "Schnelles Feuer", "Sieg-Farbe"], c: 1, e: "Die traditionelle Farbe italienischer Rennwagen." },
        { q: "Wo steht das Ferrari Werk?", o: ["Rom", "Monaco", "Maranello", "Mailand"], c: 2, e: "In Maranello schlägt das Herz der Scuderia." },
        { q: "Wer gründete das Imperium?", o: ["Luigi Ferrari", "Enzo Ferrari", "Marco Ferrari", "Amiar Ferrari"], c: 1, e: "Enzo gründete 1947 die legendäre Marke." }
    ];

    let spieler = { speed: 0, runde: 0 };

    function nav(s) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-' + s).classList.add('active');
    }

    function startRace() {
        spieler.speed = 0; spieler.runde = 0;
        nav('race');
        loadLap();
    }

    function loadLap() {
        if(spieler.runde >= RENN_DATEN.length) { finish(); return; }
        const r = RENN_DATEN[spieler.runde];
        document.getElementById('game-engine').style.display = 'block';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('q-text').innerText = r.q;
        
        const box = document.getElementById('answer-box');
        box.innerHTML = '';
        r.o.forEach((o, i) => {
            const btn = document.createElement('div');
            btn.className = 'answer-opt';
            btn.innerText = o;
            btn.onclick = () => check(i, r.c, r.e);
            box.appendChild(btn);
        });
    }

    function check(idx, correct, info) {
        document.getElementById('game-engine').style.display = 'none';
        document.getElementById('feedback').style.display = 'block';
        const title = document.getElementById('fb-title');
        document.getElementById('fb-desc').innerText = info;

        if(idx === correct) {
            title.innerText = "TURBO!";
            title.style.color = "#00ff00";
            spieler.speed += 85;
        } else {
            title.innerText = "DREHER!";
            title.style.color = varName('--ferrari-red');
            spieler.speed = Math.max(0, spieler.speed - 30);
        }
        document.getElementById('speed-display').innerText = spieler.speed.toString().padStart(3, '0');
    }

    function nextLap() {
        spieler.runde++;
        loadLap();
    }

    function finish() {
        nav('leader');
        document.getElementById('final-speed').innerText = spieler.speed + " KM/H";
    }

    function varName(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }
</script>

</body>
</html>
