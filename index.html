<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AMIAR KEMPF | CANNONBALL 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --red: #cc0000; --glass: rgba(0,0,0,0.8); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Montserrat', sans-serif; }
        
        /* Luxus Interface */
        #hud {
            position: absolute; top: 40px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; pointer-events: none;
        }
        .panel {
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 15px 25px; border-radius: 12px; backdrop-filter: blur(10px);
        }
        .brand { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 5px; font-size: 1.2rem; }
        .timer { font-family: 'Orbitron'; color: #fff; font-size: 2rem; }

        #speedo-container {
            position: absolute; bottom: 50px; right: 50px; text-align: center;
        }
        .speed-val { font-family: 'Orbitron'; font-size: 4rem; color: var(--gold); line-height: 1; }
        .unit { color: var(--red); letter-spacing: 4px; font-size: 0.8rem; font-weight: 900; }

        /* Start Button */
        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn-start {
            background: var(--gold); border: none; padding: 20px 50px; font-family: 'Orbitron';
            font-size: 1.5rem; cursor: pointer; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }
        .btn-start:hover { transform: scale(1.1); filter: brightness(1.2); }
    </style>
</head>
<body>

<div id="overlay">
    <div class="brand" style="font-size: 3rem; margin-bottom: 20px;">SCUDERIA</div>
    <div style="color: white; opacity: 0.5; margin-bottom: 40px; letter-spacing: 10px;">INFINITY 3D</div>
    <button class="btn-start" onclick="startRace()">ZÜNDUNG</button>
    <p style="color: white; margin-top: 50px; opacity: 0.3; font-size: 0.7rem;">INSPIRED BY CANNONBALL ENGINE • BY WOWA & AMIAR</p>
</div>

<div id="hud">
    <div class="panel">
        <div class="brand">AMIAR KEMPF</div>
        <div style="color: #fff; opacity: 0.5; font-size: 0.6rem; letter-spacing: 2px;">OUTRUN EDITION</div>
    </div>
    <div class="panel">
        <div style="font-size: 0.6rem; color: var(--gold);">RESTZEIT</div>
        <div class="timer" id="time-left">60</div>
    </div>
</div>

<div id="speedo-container">
    <div class="speed-val" id="speed-display">0</div>
    <div class="unit">KM/H VELOCITY</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, car, road, lines = [];
    let speed = 0, targetSpeed = 0, time = 60, gameActive = false;
    let trackOffset = 0;

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 20, 150);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Licht
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const sun = new THREE.PointLight(0xd4af37, 2, 100);
        sun.position.set(0, 20, 10);
        scene.add(sun);

        // Straße (Endlos-Effekt wie in Cannonball)
        const roadGeo = new THREE.PlaneGeometry(20, 200);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 });
        road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Goldene Markierungen
        for(let i=0; i<10; i++) {
            const lineGeo = new THREE.PlaneGeometry(0.5, 5);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xd4af37 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.y = 0.1;
            line.position.z = -i * 20;
            scene.add(line);
            lines.push(line);
        }

        // Spieler-Auto (Ferrari Style)
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 3), new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.8 }));
        body.position.y = 0.5;
        car = new THREE.Group();
        car.add(body);
        
        const glass = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1), new THREE.MeshStandardMaterial({ color: 0x000000 }));
        glass.position.set(0, 0.8, 0.2);
        car.add(glass);
        
        scene.add(car);

        animate();
    }

    function startRace() {
        document.getElementById('overlay').style.display = 'none';
        gameActive = true;
        
        // Timer Intervall
        setInterval(() => {
            if(gameActive && time > 0) {
                time--;
                document.getElementById('time-left').innerText = time;
                if(time <= 0) gameActive = false;
            }
        }, 1000);
    }

    // Controls
    let keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function animate() {
        requestAnimationFrame(animate);

        if(gameActive) {
            // Beschleunigung (W/S)
            if(keys['KeyW'] || keys['ArrowUp']) targetSpeed = 1.2;
            else targetSpeed = 0;
            
            speed += (targetSpeed - speed) * 0.05;
            
            // Lenkung (A/D)
            if(keys['KeyA'] || keys['ArrowLeft']) car.position.x -= 0.15 * (speed + 0.2);
            if(keys['KeyD'] || keys['ArrowRight']) car.position.x += 0.15 * (speed + 0.2);
            
            // Straßen-Animation (Scrolling)
            trackOffset += speed;
            lines.forEach((line, i) => {
                line.position.z = ((line.position.z + speed * 10 + 50) % 200) - 150;
            });

            // Auto-Neigung
            car.rotation.z = - (car.position.x * 0.05);
            car.position.x *= 0.95; // Auto zurück zur Mitte ziehen

            // UI
            document.getElementById('speed-display').innerText = Math.floor(speed * 280);
        }

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
