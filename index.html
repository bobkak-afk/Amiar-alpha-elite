<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Amiar Kempf · Alpha Elite Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; /* Neon Cyan */
            --secondary: #7000ff; /* Deep Purple */
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 25, 0.9);
            --text-main: #ffffff;
            --accent-red: #ff0044;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.1) 0%, transparent 40%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Hauptcontainer - Carbon & Glass-Look */
        .game-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 242, 255, 0.1);
            overflow: hidden;
            position: relative;
        }

        .game-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        /* Screens */
        .screen {
            display: none;
            padding: 35px 25px;
            animation: glitchIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }
        .screen.active { display: block; }

        @keyframes glitchIn {
            0% { opacity: 0; transform: scale(1.1); filter: brightness(2); }
            100% { opacity: 1; transform: scale(1); filter: brightness(1); }
        }

        /* Branding */
        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }
        .amiar-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
        }
        .elite-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        /* Illustration Area (Supercar statt Schloss) */
        .hero-illustration {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.5) contrast(1.2);
            transition: 0.5s;
        }
        .hero-illustration:hover .hero-img {
            filter: grayscale(0) contrast(1.1);
            transform: scale(1.05);
        }

        /* Buttons - Tactical & Heavy */
        .btn {
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .btn-primary:hover { background: #fff; transform: translateY(-2px); }
        .btn-outline {
            background: rgba(255,255,255,0.03);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-outline:hover { border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        /* Setup / Player Inputs */
        .player-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 10px 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1rem;
            outline: none;
            flex: 1;
        }
        .avatar-select {
            width: 45px; height: 45px;
            background: var(--bg-dark);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; border: 1px solid var(--primary);
        }

        /* Quiz Styles */
        .timer-container {
            width: 100%; height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.1s linear;
        }
        .question-card {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.2;
            color: var(--primary);
        }
        .option {
            background: rgba(255,255,255,0.05);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .option:hover { border-color: var(--primary); background: rgba(0, 242, 255, 0.1); }
        .option.correct { background: #00ff88; color: #000; font-weight: bold; }
        .option.wrong { background: var(--accent-red); color: #fff; }

        /* Leaderboard */
        .rank-item {
            display: flex; justify-content: space-between;
            padding: 15px; background: rgba(255,255,255,0.03);
            border-radius: 10px; margin-bottom: 8px;
            border-left: 4px solid var(--primary);
        }

        footer {
            text-align: center;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
            margin-top: 30px;
        }

        /* Mobile Adjustments */
        @media (max-width: 400px) {
            .amiar-name { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="game-container" id="app">
    <div id="homeScreen" class="screen active">
        <div class="brand-header">
            <div class="amiar-name">AMIAR KEMPF</div>
            <div class="elite-badge">ALPHA ELITE SYSTEM v2.0</div>
        </div>
        
        <div class="hero-illustration">
            <img class="hero-img" src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=800&auto=format" alt="Supercar">
        </div>

        <h2 style="text-align: center; font-family: Orbitron; margin-bottom: 25px; font-size: 1.1rem;">DOMINIERE DAS QUIZ</h2>

        <button class="btn btn-primary" id="startBtn">System Start</button>
        <button class="btn btn-outline" id="leadBtn">🏆 Leaderboard</button>
        <button class="btn btn-outline" id="achieveBtn">⚡ Stats & Skills</button>
        
        <footer>Dev by Wowa · Amiar · Elite-Core</footer>
    </div>

    <div id="setupScreen" class="screen">
        <h3 style="font-family: Orbitron; margin-bottom: 20px;">WÄHLE DEIN TEAM</h3>
        <div id="playersList"></div>
        <button class="btn btn-outline" id="addP" style="font-size: 0.8rem;">+ Weiterer Player</button>
        <div style="margin-top: 30px;">
            <button class="btn btn-primary" id="goBattle">BATTLE STARTEN</button>
            <button class="btn btn-outline" onclick="location.reload()">ABBRUCH</button>
        </div>
    </div>

    <div id="quizScreen" class="screen">
        <div style="display: flex; justify-content: space-between; font-family: Orbitron; font-size: 0.8rem; color: var(--primary);">
            <span id="qCount">ROUND 01</span>
            <span id="tVal">12.0s</span>
        </div>
        <div class="timer-container"><div id="tBar" class="timer-bar"></div></div>
        
        <div id="qText" class="question-card">LADE DATEN...</div>
        <div id="options" style="display: flex; flex-direction: column;"></div>

        <div id="feedback" style="display:none; margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px;">
            <p id="expl" style="font-size: 0.9rem; margin-bottom: 15px;"></p>
            <button class="btn btn-primary" id="nextQ">NÄCHSTE RUNDE</button>
        </div>
    </div>

    <div id="resultScreen" class="screen">
        <h2 style="font-family: Orbitron; color: var(--primary); text-align: center;">MISSION COMPLETE</h2>
        <div id="finalBoard" style="margin: 30px 0;"></div>
        <button class="btn btn-primary" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>
</div>

<script>
    const DB = [
        { q: "Welches Auto hält den 0-100 Rekord (Serie)?", o: ["Rimac Nevera", "Bugatti Chiron", "Tesla Model S Plaid", "Porsche Turbo S"], c: 0, e: "Der Rimac Nevera knackt die 100 in unter 2 Sekunden." },
        { q: "In welchem Jahr wurde Bitcoin erschaffen?", o: ["2005", "2009", "2012", "2015"], c: 1, e: "Satoshi Nakamoto veröffentlichte den Genesis Block 2009." },
        { q: "Wer hat die meisten Ballon d'Or Siege?", o: ["Cristiano Ronaldo", "Pele", "Lionel Messi", "Zidane"], c: 2, e: "Messi führt die Liste mit 8 Titeln an." },
        { q: "Was ist das stärkste natürliche Material?", o: ["Diamant", "Graphen", "Spinnenseide", "Titan"], c: 1, e: "Graphen ist auf atomarer Ebene das stabilste Material." },
        { q: "Welche Stadt hat die meisten Wolkenkratzer?", o: ["New York", "Dubai", "Hong Kong", "Shanghai"], c: 2, e: "Hong Kong führt weltweit vor New York." },
        { q: "Was bedeutet 'CPU'?", o: ["Central Processing Unit", "Core Power Unit", "Central Power User", "Computer Personal Unit"], c: 0, e: "CPU ist das Herzstück jedes Computers." }
    ];

    let players = [{ name: "Player 1", score: 0, avatar: "💀" }];
    let currentPIdx = 0;
    let currentQIdx = 0;
    let timer;
    let timeLeft = 12;

    const show = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id + 'Screen').classList.add('active');
    };

    const renderPlayers = () => {
        const list = document.getElementById('playersList');
        list.innerHTML = players.map((p, i) => `
            <div class="player-box">
                <div class="avatar-select">${p.avatar}</div>
                <input class="player-input" value="${p.name}" onchange="players[${i}].name=this.value">
            </div>
        `).join('');
    };

    document.getElementById('startBtn').onclick = () => { show('setup'); renderPlayers(); };
    document.getElementById('addP').onclick = () => { players.push({name: "Player "+(players.length+1), score:0, avatar: "🔥"}); renderPlayers(); };
    
    document.getElementById('goBattle').onclick = () => {
        currentPIdx = 0;
        startPlayerTurn();
    };

    function startPlayerTurn() {
        currentQIdx = 0;
        players[currentPIdx].score = 0;
        loadQuestion();
        show('quiz');
    }

    function loadQuestion() {
        if (currentQIdx >= 5) { // 5 Fragen pro Spieler
            nextTurn();
            return;
        }
        const q = DB[Math.floor(Math.random() * DB.length)];
        document.getElementById('qCount').innerText = `MISSION ${currentQIdx + 1}/5`;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('feedback').style.display = 'none';
        const optCont = document.getElementById('options');
        optCont.style.display = 'flex';
        optCont.innerHTML = '';
        
        q.o.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = opt;
            div.onclick = () => check(i, q.c, q.e);
            optCont.appendChild(div);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timeLeft = 12;
        timer = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('tBar').style.width = (timeLeft/12)*100 + "%";
            document.getElementById('tVal').innerText = Math.ceil(timeLeft) + "s";
            if (timeLeft <= 0) check(-1, 0, "Zeit abgelaufen!");
        }, 100);
    }

    function check(choice, correct, fact) {
        clearInterval(timer);
        document.getElementById('options').style.display = 'none';
        document.getElementById('feedback').style.display = 'block';
        document.getElementById('expl').innerText = fact;
        
        if (choice === correct) {
            players[currentPIdx].score++;
            document.getElementById('expl').style.color = "#00ff88";
        } else {
            document.getElementById('expl').style.color = "#ff0044";
        }
    }

    document.getElementById('nextQ').onclick = () => {
        currentQIdx++;
        loadQuestion();
    };

    function nextTurn() {
        currentPIdx++;
        if (currentPIdx < players.length) {
            alert(`Nächster Player: ${players[currentPIdx].name}`);
            startPlayerTurn();
        } else {
            finish();
        }
    }

    function finish() {
        show('result');
        const board = document.getElementById('finalBoard');
        board.innerHTML = players.sort((a,b) => b.score - a.score).map(p => `
            <div class="rank-item">
                <span>${p.avatar} ${p.name}</span>
                <span style="color:var(--primary)">${p.score} PTS</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
