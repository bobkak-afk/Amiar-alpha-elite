<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMIAR KEMPF | SCUDERIA ARCADE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Luxus UI - Inspiriert von deiner neuen Design-Richtung */
        #ui {
            position: absolute; top: 30px; left: 30px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.3);
            color: white; z-index: 10;
        }
        .brand { font-weight: 900; letter-spacing: 3px; color: #d4af37; margin-bottom: 5px; }
        .stats { font-family: monospace; font-size: 1.2rem; color: #f7ef8a; }

        /* Steuerungseinblendung für Mobile */
        #mobile-hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.4); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="brand">AMIAR KEMPF | SCUDERIA</div>
        <div class="stats">SPEED: <span id="kmh">0</span> KM/H</div>
        <div style="font-size: 0.7rem; opacity: 0.5; margin-top: 10px;">WOWA EDITION V1.0</div>
    </div>

    <div id="mobile-hint">NUTZE WASD ODER PFEILTASTEN</div>

    <canvas id="gameCanvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 10, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Licht für Luxus-Reflektionen
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const light = new THREE.PointLight(0xd4af37, 2, 50);
        light.position.set(0, 10, 0);
        scene.add(light);

        // --- RENNSTRECKE (Boden) ---
        const groundGeo = new THREE.PlaneGeometry(20, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.1, 
            metalness: 0.5 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Goldene Seitenlinien
        const lineLeft = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 1000), new THREE.MeshBasicMaterial({color: 0xd4af37}));
        lineLeft.rotation.x = -Math.PI / 2;
        lineLeft.position.set(-5, 0.01, 0);
        scene.add(lineLeft);

        const lineRight = lineLeft.clone();
        lineRight.position.x = 5;
        scene.add(lineRight);

        // --- DAS AUTO (Ferrari Style) ---
        const carGroup = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(1.2, 0.5, 2.5),
            new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.8, roughness: 0.2 })
        );
        body.position.y = 0.5;
        carGroup.add(body);

        const cockpit = new THREE.Mesh(
            new THREE.BoxGeometry(0.9, 0.4, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x000000 })
        );
        cockpit.position.set(0, 0.8, 0.2);
        carGroup.add(cockpit);

        scene.add(carGroup);

        // --- HINDERNISSE (Basierend auf dem Block-System im Bild) ---
        const obstacles = [];
        function createObstacle(z) {
            const geometry = new THREE.BoxGeometry(2, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const block = new THREE.Mesh(geometry, material);
            block.position.set((Math.random() - 0.5) * 8, 0.5, z);
            scene.add(block);
            obstacles.push(block);
        }

        for(let i = 0; i < 20; i++) {
            createObstacle(-i * 30);
        }

        // --- STEUERUNG (Übernommen und verbessert aus deinem Bild) ---
        const controls = { forward: false, backward: false, left: false, right: false };
        let speed = 0;
        let kmh = 0;

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') controls.forward = true;
            if (e.key.toLowerCase() === 's') controls.backward = true;
            if (e.key.toLowerCase() === 'a') controls.left = true;
            if (e.key.toLowerCase() === 'd') controls.right = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') controls.forward = false;
            if (e.key.toLowerCase() === 's') controls.backward = false;
            if (e.key.toLowerCase() === 'a') controls.left = false;
            if (e.key.toLowerCase() === 'd') controls.right = false;
        });

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            // Beschleunigungs-Logik
            if (controls.forward) speed += 0.005;
            else speed *= 0.98; // Rollen lassen

            // Lenkung
            if (controls.left) carGroup.position.x -= 0.15 * (speed * 2);
            if (controls.right) carGroup.position.x += 0.15 * (speed * 2);

            // Bewegung des Autos (Relativ zur Welt)
            ground.position.z += speed * 10;
            lineLeft.position.z += speed * 10;
            lineRight.position.z += speed * 10;

            // Hindernisse bewegen (Endlos-Schleife)
            obstacles.forEach(obs => {
                obs.position.z += speed * 10;
                if (obs.position.z > 10) {
                    obs.position.z = -500;
                    obs.position.x = (Math.random() - 0.5) * 8;
                }
                
                // Einfache Kollision
                if (Math.abs(carGroup.position.z - obs.position.z) < 1.5 && 
                    Math.abs(carGroup.position.x - obs.position.x) < 1.5) {
                    speed = 0; // Crash!
                }
            });

            // Boden zurücksetzen für Endlos-Effekt
            if (ground.position.z > 500) ground.position.z = 0;

            // Kamera-Position (Verfolgermodus)
            camera.position.set(carGroup.position.x, 3, 7);
            camera.lookAt(carGroup.position.x, 1, carGroup.position.z - 5);

            // UI Update
            kmh = Math.floor(speed * 1000);
            document.getElementById('kmh').innerText = kmh;

            renderer.render(scene, camera);
        }

        animate();

        // Resize Handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
