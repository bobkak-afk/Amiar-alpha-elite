<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMIAR KEMPF | ELITE VELOCITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --elite-gold: #d4af37;
            --nitro-red: #ff0044;
            --bg-dark: #050506;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: white; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

        /* --- BACKGROUND & OVERLAY --- */
        .app-shell {
            width: 100%; max-width: 480px; height: 95vh;
            background: radial-gradient(circle at top, #1a1a1e, #050506);
            border-radius: 40px; border: 1px solid var(--border);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 40px rgba(0, 242, 255, 0.05);
        }

        /* --- RACING TRACK VISUALIZATION --- */
        .track-container {
            height: 140px; width: 100%; background: rgba(0,0,0,0.4);
            position: relative; border-bottom: 1px solid var(--border);
            overflow: hidden; padding: 10px;
        }
        .finish-line { position: absolute; right: 20px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); opacity: 0.2; }
        
        .car-lane { position: relative; height: 30px; margin-bottom: 5px; width: 100%; }
        .car { 
            position: absolute; left: 0; transition: left 1s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            font-size: 1.5rem; filter: drop-shadow(0 0 5px var(--neon-cyan));
        }

        /* --- HUD --- */
        .hud-header { padding: 20px; text-align: center; }
        .brand { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 5px; font-size: 1.4rem; background: linear-gradient(to right, #fff, var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stats-display { display: flex; justify-content: space-between; padding: 0 25px; margin-top: 10px; }
        .stat-item { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--neon-cyan); letter-spacing: 1px; }

        /* --- MAIN SCREEN AREA --- */
        .screen { display: none; flex: 1; padding: 25px; flex-direction: column; z-index: 10; }
        .active { display: flex; }

        /* --- ITEM SLOT --- */
        .item-slot-container {
            width: 80px; height: 80px; background: var(--glass); border: 2px solid var(--elite-gold);
            margin: 20px auto; border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; position: relative; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .item-label { position: absolute; bottom: -10px; background: var(--elite-gold); color: black; font-size: 0.5rem; font-weight: 900; padding: 2px 8px; border-radius: 5px; font-family: 'Orbitron'; }

        /* --- QUIZ UI --- */
        .timer-track { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .timer-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--neon-cyan), #7000ff); transition: width 0.1s linear; }

        .question-box { font-size: 1.25rem; font-weight: 800; text-align: center; margin-bottom: 25px; line-height: 1.4; color: #fff; }
        .option-btn { 
            background: var(--glass); padding: 18px; border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 12px; cursor: pointer; transition: all 0.2s; font-weight: 600; text-align: center;
        }
        .option-btn:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--neon-cyan); transform: translateY(-2px); }
        .correct { background: #00ff88 !important; color: black; font-weight: 900; }
        .wrong { background: var(--nitro-red) !important; }

        /* --- BUTTONS --- */
        .btn-elite {
            padding: 20px; border-radius: 20px; border: none; font-family: 'Orbitron'; font-weight: 900;
            text-transform: uppercase; cursor: pointer; background: linear-gradient(135deg, var(--neon-cyan), #0072ff);
            color: white; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3); transition: 0.3s; width: 100%;
        }
        .btn-elite:active { transform: scale(0.95); }

        /* --- ANIMATIONS --- */
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
        .v12-active { animation: glitch 0.1s infinite; opacity: 0.8; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="track-container" id="track">
        <div class="finish-line"></div>
        </div>

    <header class="hud-header">
        <div class="brand">AMIAR KEMPF</div>
        <div style="font-size: 0.5rem; letter-spacing: 4px; color: var(--elite-gold); font-family: Orbitron;">ALPHA ELITE VELOCITY V3.0</div>
        
        <div class="stats-display">
            <div class="stat-item">POS: <span id="posVal">1st</span></div>
            <div class="stat-item">RPM: <span id="rpmVal">0000</span></div>
            <div class="stat-item" id="engineStatus">V12: IDLE</div>
        </div>
    </header>

    <div id="home" class="screen active">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div style="font-size: 5rem; margin-bottom: 20px;">🏎️</div>
            <h2 style="font-family: Orbitron; text-align:center; letter-spacing: 2px;">START YOUR ENGINE</h2>
        </div>
        <button class="btn-elite" onclick="initGame()">IGNITION (START)</button>
    </div>

    <div id="race" class="screen">
        <div class="item-slot-container" id="itemSlot">
            ? <div class="item-label">ITEM SLOT</div>
        </div>

        <div class="timer-track"><div id="tBar" class="timer-fill"></div></div>
        
        <div id="qArea">
            <div id="qText" class="question-box">Warte auf Signal...</div>
            <div id="options"></div>
        </div>

        <div id="feedback" style="display:none; text-align:center;">
            <h3 id="resultStatus" style="font-family: Orbitron; margin-bottom: 10px;"></h3>
            <p id="factText" style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px;"></p>
            <button class="btn-elite" onclick="nextAction()">WEITER</button>
        </div>
    </div>

    <div id="leader" class="screen">
        <h2 style="font-family: Orbitron; color: var(--elite-gold); text-align:center; margin-bottom: 30px;">PODIUM</h2>
        <div id="podiumList"></div>
        <button class="btn-elite" style="margin-top:auto;" onclick="location.reload()">RE-RACE</button>
    </div>
</div>

<script>
    // --- ENGINE SOUND SYSTEM (Synthesized V12) ---
    let audioCtx, oscillator, gainNode;

    function startEngineSound() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }
        gainNode.gain.value = 0.05;
        document.getElementById('engineStatus').innerText = "V12: ACTIVE";
        document.getElementById('engineStatus').classList.add('v12-active');
    }

    function updateEnginePitch(score) {
        if (oscillator) {
            let pitch = 40 + (score / 10);
            oscillator.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);
            document.getElementById('rpmVal').innerText = Math.floor(pitch * 100);
        }
    }

    // --- GAME LOGIC ---
    const DB = [
        { q: "Welches Hypercar hat 1914 PS?", o: ["Bugatti Chiron", "Rimac Nevera", "Koenigsegg Jesko", "Pininfarina Battista"], c: 1, e: "Der Rimac Nevera hält aktuell zahlreiche Weltrekorde." },
        { q: "Was bedeutet 'DRS' im Rennsport?", o: ["Direct Race Speed", "Drag Reduction System", "Dynamic Rear Spoiler", "Dual Racing Steering"], c: 1, e: "DRS klappt den Heckflügel flach, um den Luftwiderstand zu senken." },
        { q: "Welcher Hersteller nutzt das 'Cavallino Rampante'?", o: ["Porsche", "Lamborghini", "Ferrari", "Maserati"], c: 2, e: "Das tänzelnde Pferd ist das ikonische Logo von Ferrari." },
        { q: "Wo findet das legendäre 24h-Rennen statt?", o: ["Monaco", "Le Mans", "Nürburgring", "Spa"], c: 1, e: "Le Mans ist die Wiege des Langstrecken-Rennsports." },
        { q: "Was ist ein 'V12'?", o: ["12 Ventile", "12 Zylinder", "12 Volt Batterie", "12 Gänge"], c: 1, e: "V12 steht für eine Motorbauform mit 12 Zylindern in V-Anordnung." }
    ];

    const ITEMS = [
        { n: "NITRO", i: "🚀", p: 2 },
        { n: "SHIELD", i: "🛡️", p: 1 },
        { n: "OIL", i: "🛢️", p: 0 }
    ];

    let players = [
        { id: 0, name: "Amiar Kempf", score: 0, car: "🏎️", item: null, trap: false },
        { id: 1, name: "Elite Opponent", score: 0, car: "🚙", item: null, trap: false }
    ];

    let curP = 0, curQ = 0, timer, timeLeft = 10;

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initGame() {
        startEngineSound();
        renderTrack();
        startTurn();
    }

    function renderTrack() {
        const track = document.getElementById('track');
        track.innerHTML = '<div class="finish-line"></div>';
        players.forEach(p => {
            const lane = document.createElement('div');
            lane.className = 'car-lane';
            lane.innerHTML = `<div id="car-${p.id}" class="car">${p.car}</div>`;
            track.appendChild(lane);
        });
    }

    function startTurn() {
        curQ = 0;
        nav('race');
        loadQuestion();
    }

    function updateItemUI() {
        const slot = document.getElementById('itemSlot');
        if (players[curP].item) {
            slot.innerHTML = `${players[curP].item.i} <div class="item-label">${players[curP].item.n}</div>`;
            slot.style.borderColor = "var(--neon-cyan)";
        } else {
            slot.innerHTML = `? <div class="item-label">ITEM SLOT</div>`;
            slot.style.borderColor = "var(--elite-gold)";
        }
    }

    function loadQuestion() {
        if (curQ >= 3) {
            nextPlayer();
            return;
        }

        updateItemUI();
        const data = DB[Math.floor(Math.random() * DB.length)];
        document.getElementById('qArea').style.display = 'block';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('qText').innerText = data.q;
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        data.o.forEach((o, i) => {
            const b = document.createElement('div');
            b.className = 'option-btn';
            b.innerText = o;
            b.onclick = () => check(i, data.c, data.e);
            optCont.appendChild(b);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        timeLeft = players[curP].trap ? 5 : 10;
        players[curP].trap = false;
        
        timer = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('tBar').style.width = (timeLeft / (players[curP].trap ? 5 : 10)) * 100 + "%";
            if (timeLeft <= 0) check(-1, 0, "MOTOR AUSSETZER! Zu langsam.");
        }, 100);
    }

    function check(idx, correct, fact) {
        clearInterval(timer);
        document.getElementById('qArea').style.display = 'none';
        document.getElementById('feedback').style.display = 'block';
        document.getElementById('factText').innerText = fact;

        if (idx === correct) {
            let gain = Math.round(timeLeft * 50);
            
            // Item Logic
            if (players[curP].item && players[curP].item.n === "NITRO") {
                gain *= 2;
                players[curP].item = null;
            }

            players[curP].score += gain;
            updateEnginePitch(players[curP].score);
            updateCarPos();
            
            // Item Dropping
            if (Math.random() > 0.5 && !players[curP].item) {
                players[curP].item = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                if (players[curP].item.n === "OIL") {
                   let next = (curP + 1) % players.length;
                   players[next].trap = true;
                }
            }

            document.getElementById('resultStatus').innerText = "SAUBERER DRIFT!";
            document.getElementById('resultStatus').style.color = "#00ff88";
        } else {
            document.getElementById('resultStatus').innerText = "CRASH!";
            document.getElementById('resultStatus').style.color = "var(--nitro-red)";
        }
    }

    function updateCarPos() {
        const maxScore = 1500;
        players.forEach(p => {
            const carEl = document.getElementById(`car-${p.id}`);
            const pos = Math.min((p.score / maxScore) * 85, 85);
            carEl.style.left = pos + "%";
        });
        
        // Rank update
        let sorted = [...players].sort((a,b) => b.score - a.score);
        document.getElementById('posVal').innerText = (sorted.findIndex(p => p.id === players[curP].id) + 1) + "st";
    }

    function nextAction() {
        curQ++;
        loadQuestion();
    }

    function nextPlayer() {
        curP++;
        if (curP < players.length) {
            alert(`Pilotenwechsel: ${players[curP].name} übernimmt das Cockpit!`);
            startTurn();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        nav('leader');
        if (oscillator) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
        const pod = document.getElementById('podiumList');
        const sorted = [...players].sort((a,b) => b.score - a.score);
        pod.innerHTML = sorted.map((p, i) => `
            <div style="background:var(--glass); padding:20px; border-radius:20px; margin-bottom:10px; display:flex; justify-content:space-between; border-left: 5px solid ${i==0?'var(--elite-gold)':'var(--neon-cyan)'}">
                <span><b>#${i+1}</b> ${p.name}</span>
                <span style="font-family:Orbitron; color:var(--neon-cyan)">${p.score} KM/H</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
