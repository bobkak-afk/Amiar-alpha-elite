<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AMIAR KEMPF | 3D ELITE VELOCITY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37, #f7ef8a, #ae8625, #f7ef8a, #d4af37);
            --gold-solid: #d4af37;
            --bg: #000;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- 3D CANVAS --- */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- UI OVERLAY --- */
        .app-shell {
            position: relative; z-index: 10; width: 100%; max-width: 480px; height: 100vh;
            margin: 0 auto; display: flex; flex-direction: column; pointer-events: none;
        }
        .app-shell > * { pointer-events: auto; }

        /* --- HEADER --- */
        .header { padding: 60px 30px 20px; text-align: center; }
        .brand { 
            font-family: 'Cinzel', serif; font-size: 1.8rem; letter-spacing: 8px;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }
        .subtitle { font-family: 'Orbitron'; font-size: 0.5rem; letter-spacing: 4px; color: #555; margin-top: 5px; }

        /* --- SCREENS --- */
        .screen { display: none; flex: 1; padding: 25px; flex-direction: column; justify-content: center; opacity: 0; transition: 0.5s ease; }
        .screen.active { display: flex; opacity: 1; }

        /* --- LUXURY CARDS (Bento) --- */
        .bento-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 30px; padding: 25px; backdrop-filter: blur(20px);
            margin-bottom: 20px; position: relative; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- BUTTONS --- */
        .btn-prime {
            background: var(--gold); color: #000; border: none; padding: 22px;
            border-radius: 20px; font-family: 'Orbitron'; font-weight: 900; 
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px;
            cursor: pointer; transition: 0.4s; box-shadow: 0 10px 40px rgba(174, 134, 37, 0.4);
        }
        .btn-prime:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- HUD --- */
        .hud-top { display: flex; justify-content: space-between; padding: 0 20px; margin-bottom: 20px; }
        .hud-stat { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 10px 20px; text-align: center; }
        .hud-label { font-size: 0.5rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .hud-val { font-family: 'Orbitron'; color: var(--gold-solid); display: block; }

        /* --- QUIZ UI --- */
        .q-text { font-size: 1.5rem; font-weight: 300; text-align: center; margin-bottom: 40px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .option {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 22px; border-radius: 20px; margin-bottom: 15px; cursor: pointer;
            transition: 0.3s; text-align: center; font-weight: 500;
        }
        .option:hover { background: rgba(212, 175, 55, 0.1); border-color: var(--gold-solid); }
        
        /* --- NAVIGATION --- */
        .bottom-nav {
            padding: 20px 30px calc(20px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px); border-top: 1px solid var(--border);
        }
        .nav-link { color: #666; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-align: center; }
        .nav-link.active { color: var(--gold-solid); }

        /* --- FOOTER --- */
        .credits {
            position: absolute; bottom: 100px; width: 100%; text-align: center;
            font-size: 0.6rem; letter-spacing: 2px; color: #444; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="app-shell">
    <header class="header">
        <div class="brand">AMIAR KEMPF</div>
        <div class="subtitle">VELOCITY 3D PLATINUM</div>
    </header>

    <div id="screen-home" class="screen active">
        <div class="bento-card">
            <h2 style="font-family: Cinzel; text-align: center; margin-bottom: 15px;">WILLKOMMEN</h2>
            <p style="text-align: center; font-size: 0.9rem; opacity: 0.7; line-height: 1.6;">
                Erlebe die Symbiose aus Luxus und Geschwindigkeit. Das Elite-System ist bereit für den Check-In.
            </p>
        </div>
        <button class="btn-prime" onclick="startGame()">Zündung Starten</button>
    </div>

    <div id="screen-race" class="screen">
        <div class="hud-top">
            <div class="hud-stat"><span class="hud-label">Speed</span><span class="hud-val" id="hud-score">0</span></div>
            <div class="hud-stat"><span class="hud-label">Sektor</span><span class="hud-val" id="hud-q">1/3</span></div>
        </div>
        
        <div id="quiz-content">
            <h2 class="q-text" id="q-text">Lade Engine...</h2>
            <div id="options-box"></div>
        </div>

        <div id="feedback" style="display:none; text-align:center;">
            <h1 id="fb-status" style="font-family: Cinzel; margin-bottom: 20px;"></h1>
            <button class="btn-prime" style="width: 100%;" onclick="nextAction()">Nächster Sektor</button>
        </div>
    </div>

    <div id="screen-leader" class="screen">
        <h2 style="font-family: Cinzel; text-align: center; margin-bottom: 30px;">BESTENLISTE</h2>
        <div id="leader-list"></div>
        <button class="btn-prime" style="margin-top: 20px;" onclick="location.reload()">Neustart</button>
    </div>

    <div class="credits">Produziert von Wowa & Amiar Kempf</div>

    <nav class="bottom-nav">
        <div class="nav-link" onclick="nav('home')">🏠<br>Home</div>
        <div class="nav-link" onclick="nav('leader')">🏆<br>Elite</div>
    </nav>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- 3D ENGINE (THREE.JS) ---
    let scene, camera, renderer, car, particles;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Licht
        const light = new THREE.PointLight(0xd4af37, 2, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        // Ersatz für Car-Modul (Ein glänzendes, abstraktes Hypercar-Objekt)
        const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xae8625, metalness: 1, roughness: 0.1,
            emissive: 0xd4af37, emissiveIntensity: 0.2
        });
        car = new THREE.Mesh(geometry, material);
        scene.add(car);

        // Partikel (Goldstaub)
        const partGeo = new THREE.BufferGeometry();
        const partCount = 500;
        const posArray = new Float32Array(partCount * 3);
        for(let i=0; i<partCount*3; i++) posArray[i] = (Math.random() - 0.5) * 10;
        partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const partMat = new THREE.PointsMaterial({ size: 0.02, color: 0xd4af37, transparent: true, opacity: 0.5 });
        particles = new THREE.Points(partGeo, partMat);
        scene.add(particles);

        camera.position.z = 5;
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        car.rotation.y += 0.005;
        car.rotation.x += 0.002;
        particles.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    // --- GAME LOGIC ---
    const DB = [
        { q: "Welches Auto knackte als erstes die 300 mph Grenze?", o: ["Bugatti Chiron SS", "Koenigsegg Agera RS", "Hennessey Venom", "SSC Tuatara"], c: 0, e: "Der Chiron Super Sport 300+ schrieb Geschichte." },
        { q: "Was bedeutet 'Amiar Kempf Velocity'?", o: ["Maximale Power", "Pure Eleganz", "Elite Performance", "Alles zusammen"], c: 3, e: "Ein Standard für sich." },
        { q: "Welcher Motor liefert den reinsten Klang?", o: ["V8 Turbo", "V10 Saugmotor", "V12 Bi-Turbo", "Elektro"], c: 1, e: "Der V10 Saugmotor (wie im LFA) gilt als akustisches Meisterwerk." }
    ];

    let state = { score: 0, curQ: 0, timer: null };

    function nav(s) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-' + s).classList.add('active');
    }

    function startGame() {
        state.score = 0;
        state.curQ = 0;
        nav('race');
        loadQ();
    }

    function loadQ() {
        if(state.curQ >= DB.length) { showFinal(); return; }
        const q = DB[state.curQ];
        document.getElementById('quiz-content').style.display = 'block';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('hud-q').innerText = (state.curQ + 1) + "/" + DB.length;
        
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        q.o.forEach((o, i) => {
            const btn = document.createElement('div');
            btn.className = 'option';
            btn.innerText = o;
            btn.onclick = () => check(i, q.c);
            box.appendChild(btn);
        });
    }

    function check(idx, correct) {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('feedback').style.display = 'block';
        const status = document.getElementById('fb-status');
        
        if(idx === correct) {
            status.innerText = "PERFEKT";
            status.style.color = "#d4af37";
            state.score += 500;
            // 3D Effekt bei Erfolg
            car.scale.set(1.5, 1.5, 1.5);
            setTimeout(() => car.scale.set(1, 1, 1), 500);
        } else {
            status.innerText = "ABSTURZ";
            status.style.color = "#ff4444";
        }
        document.getElementById('hud-score').innerText = state.score;
    }

    function nextAction() { state.curQ++; loadQ(); }

    function showFinal() {
        nav('leader');
        document.getElementById('leader-list').innerHTML = `
            <div class="bento-card" style="text-align: center;">
                <h3 style="color: var(--gold-solid)">DEIN STATUS</h3>
                <h1 style="font-family: Orbitron; font-size: 3rem;">${state.score}</h1>
                <p>KM/H ELITE SPEED</p>
            </div>
        `;
    }

    // Init 3D & Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init3D();
</script>
</body>
</html>
