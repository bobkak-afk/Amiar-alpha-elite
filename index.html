<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏁 ARCADE RACER – Mario Kart Style 🏁</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a2f2a, #030e0a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }
        .game-wrapper {
            position: relative;
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), 0 0 0 5px #ffcc44, 0 0 0 12px #1a2a2a;
            background: #000;
            width: fit-content;
            max-width: 100%;
        }
        canvas {
            display: block;
            border-radius: 28px;
            cursor: pointer;
            width: 100%;
            height: auto;
            aspect-ratio: 800 / 600;
        }
        .ui-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            text-shadow: 2px 2px 0 #000;
            font-weight: bold;
        }
        .panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 60px;
            color: #ffdd99;
            font-size: 1.1rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,215,0,0.5);
            font-family: monospace;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
            z-index: 20;
        }
        button, .steer-pad {
            pointer-events: auto;
            background: #1e2f3a;
            border: none;
            font-size: 1.2rem;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 0 #0a1217;
            transition: 0.05s linear;
            font-family: monospace;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a1217;
        }
        .drift-btn {
            background: #ff8800;
            color: #1e1e1e;
            box-shadow: 0 4px 0 #aa5500;
        }
        .item-btn {
            background: #44aa66;
        }
        .steer-pad {
            width: 200px;
            background: #2c3e2f;
            text-align: center;
            cursor: grab;
        }
        @media (max-width: 700px) {
            .panel { font-size: 0.75rem; padding: 4px 12px; }
            button, .steer-pad { padding: 6px 14px; font-size: 0.9rem; }
            .steer-pad { width: 140px; }
        }
        .boost-container {
            position: absolute;
            bottom: 90px;
            left: 20px;
            width: 160px;
            height: 10px;
            background: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid gold;
            pointer-events: none;
        }
        .boost-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa33, #ffff88);
            transition: width 0.03s linear;
        }
        .item-icon {
            position: absolute;
            bottom: 90px;
            right: 20px;
            width: 52px;
            height: 52px;
            background: #000000aa;
            backdrop-filter: blur(6px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: 1px solid gold;
            pointer-events: none;
            font-weight: bold;
        }
        .victory {
            position: absolute;
            inset: 0;
            background: #000000cc;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: gold;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            text-align: center;
            border-radius: 28px;
        }
        .victory.show {
            opacity: 1;
            pointer-events: auto;
        }
        .restart {
            margin-top: 30px;
            background: gold;
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="ui-bar">
        <div class="panel">🏁 RUNDE <span id="lap">0</span>/3</div>
        <div class="panel">🥇 POS <span id="position">1</span> &nbsp; ⏱️ <span id="timer">0.0</span>s</div>
    </div>
    <div class="boost-container"><div class="boost-fill" id="boostFill"></div></div>
    <div class="item-icon" id="itemIcon">📦</div>
    <div class="controls">
        <div class="steer-pad" id="steerZone">◀ 🏎️  ▶</div>
        <button id="driftTouch" class="drift-btn">🌀 DRIFT</button>
        <button id="itemTouch" class="item-btn">✨ ITEM</button>
    </div>
    <div id="victoryOverlay" class="victory">
        🏆 SIEG! 🏆<br>
        <div class="restart" onclick="location.reload()">🏁 NEUES RENNEN</div>
    </div>
</div>

<script>
    (function(){
        // -------------------- KONFIGURATION --------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W = 800, H = 600;
        canvas.width = W; canvas.height = H;

        // Projektion
        let fov = 70 * Math.PI/180;
        let scaleX = W / Math.tan(fov/2);
        let scaleY = H / Math.tan(fov/2);

        // Streckenparameter
        const ROAD_WIDTH = 3.4;
        const SEGMENT_COUNT = 140;
        let segments = [];
        let waypoints = [];      // 3D Positionen (z, x-Kurve)
        
        // Spieler
        let player = {
            x: 0,                // -1..1 Fahrspur
            speed: 0,
            maxSpeed: 13.2,
            acc: 0.28,
            turnSpeed: 2.7,
            drift: false,
            driftTimer: 0,
            driftBoostReady: false,
            lap: 0,
            currentItem: null,
            z: 8                 // Position auf der Strecke (Welt-Z)
        };
        
        let raceActive = true;
        let raceTimer = 0;
        let totalLaps = 3;
        
        // KI-Gegner
        let kies = [
            { x: 0.35, z: 25, speed: 4.3, item: null, cooldown: 0, color: '#44aa44', lap: 0 },
            { x: -0.2, z: 48, speed: 4.8, item: null, cooldown: 0, color: '#4488ff', lap: 0 },
            { x: 0.5, z: 70, speed: 3.9, item: null, cooldown: 0, color: '#aa44aa', lap: 0 }
        ];
        
        // Dynamische Items (auf der Straße)
        let roadItems = [];
        
        // -------------------- STECKEN-GENERIERUNG --------------------
        function buildTrack() {
            segments = [];
            for(let i=0; i<=SEGMENT_COUNT; i++) {
                let t = i / SEGMENT_COUNT;
                let curve = 0;
                // abwechslungsreiche Kurven
                if(t > 0.2 && t < 0.4) curve = 0.85 * Math.sin((t-0.2)*22);
                else if(t > 0.55 && t < 0.75) curve = -0.7 * Math.sin((t-0.55)*20);
                else if(t > 0.85) curve = 0.5 * Math.sin((t-0.85)*28);
                let itemType = null;
                if(i % 17 === 5 && i > 12) itemType = 'random';
                segments.push({
                    z: i * 1.55,            // Tiefe
                    curve: curve,
                    item: itemType,
                    color: (Math.floor(i/7) % 2 === 0) ? '#3a7a3a' : '#2a5a2a'
                });
            }
            // Wegpunkte für Rundenlogik aus den Segmenten
            waypoints = segments.map(s => ({ z: s.z, curve: s.curve }));
        }
        buildTrack();
        const MAX_Z = segments[segments.length-1].z;
        
        // -------------------- HILFSFUNKTIONEN --------------------
        function getSegmentAtZ(zWorld) {
            if(zWorld <= 0) return segments[0];
            for(let i=0; i<segments.length-1; i++) {
                if(zWorld >= segments[i].z && zWorld < segments[i+1].z) return segments[i];
            }
            return segments[segments.length-1];
        }
        
        function project(worldX, worldY, worldZ) {
            if(worldZ <= 0.3) return null;
            let xScreen = (worldX * scaleX) / worldZ + W/2;
            let yScreen = H/2 - (worldY * scaleY) / worldZ;
            return { x: xScreen, y: yScreen, scale: scaleX / worldZ };
        }
        
        // -------------------- RENDERING (Straße + Sprites) --------------------
        function renderRoad() {
            // von hinten nach vorne
            for(let i=segments.length-1; i>=0; i--) {
                let seg = segments[i];
                let zSeg = seg.z + 0.05;
                if(zSeg < 0.6) continue;
                // Weltkoordinaten der Straßenränder (beeinflusst durch Spielerposition + Kurve)
                let curveOffset = seg.curve * (zSeg / 55);
                let leftWorld = -ROAD_WIDTH/2 + player.x * 1.6 + curveOffset;
                let rightWorld = ROAD_WIDTH/2 + player.x * 1.6 + curveOffset;
                
                let leftProj = project(leftWorld, 0, zSeg);
                let rightProj = project(rightWorld, 0, zSeg);
                if(!leftProj || !rightProj) continue;
                
                let bottomSeg = (i>0) ? segments[i-1] : segments[i];
                let zBottom = bottomSeg.z + 0.05;
                let curveOffsetBottom = bottomSeg.curve * (zBottom / 55);
                let leftBottomWorld = -ROAD_WIDTH/2 + player.x * 1.6 + curveOffsetBottom;
                let rightBottomWorld = ROAD_WIDTH/2 + player.x * 1.6 + curveOffsetBottom;
                let leftBottomProj = project(leftBottomWorld, 0, zBottom);
                let rightBottomProj = project(rightBottomWorld, 0, zBottom);
                if(!leftBottomProj || !rightBottomProj) continue;
                
                let y1 = leftProj.y;
                let y2 = leftBottomProj.y;
                if(y1 >= y2) continue;
                
                // Trapez zeichnen
                ctx.beginPath();
                ctx.moveTo(leftProj.x, y1);
                ctx.lineTo(rightProj.x, y1);
                ctx.lineTo(rightBottomProj.x, y2);
                ctx.lineTo(leftBottomProj.x, y2);
                ctx.fillStyle = seg.color;
                ctx.fill();
                ctx.strokeStyle = '#eedd99';
                ctx.lineWidth = 1.2;
                ctx.stroke();
                
                // Mittellinie
                let midX1 = (leftProj.x + rightProj.x)/2;
                let midX2 = (leftBottomProj.x + rightBottomProj.x)/2;
                ctx.beginPath();
                ctx.moveTo(midX1, y1);
                ctx.lineTo(midX2, y2);
                ctx.strokeStyle = '#ffdd88';
                ctx.setLineDash([8, 12]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        
        function renderSprites() {
            let sprites = [];
            // Gegner
            for(let ki of kies) {
                let dz = ki.z - player.z;
                if(dz > 0.8 && dz < 70) {
                    let worldX = ki.x * 1.2;
                    let proj = project(worldX, 0.2, dz);
                    if(proj) sprites.push({ type: 'ki', color: ki.color, proj, z: dz, kiRef: ki });
                }
            }
            // Items
            for(let it of roadItems) {
                let dz = it.z - player.z;
                if(dz > 0.4 && dz < 60) {
                    let proj = project(it.x, 0.1, dz);
                    if(proj) sprites.push({ type: it.type, proj, z: dz, data: it });
                }
            }
            sprites.sort((a,b)=>b.z - a.z);
            for(let s of sprites) {
                let size = 0.8 * (scaleX / s.z);
                let x = s.proj.x - size/2;
                let y = s.proj.y - size/2;
                if(s.type === 'ki') {
                    ctx.fillStyle = s.color;
                    ctx.shadowBlur = 6;
                    ctx.fillRect(x, y, size, size*0.7);
                    ctx.fillStyle = '#111';
                    ctx.fillRect(x+size*0.2, y+size*0.2, size*0.2, size*0.2);
                    ctx.fillRect(x+size*0.6, y+size*0.2, size*0.2, size*0.2);
                } else if(s.type === 'banana') {
                    ctx.fillStyle = '#f5bc42';
                    ctx.beginPath();
                    ctx.ellipse(x+size/2, y+size/2, size/2.5, size/3.5, 0, 0, 2*Math.PI);
                    ctx.fill();
                } else if(s.type === 'mushroom') {
                    ctx.fillStyle = '#dd4444';
                    ctx.fillRect(x+size*0.3, y, size*0.4, size*0.6);
                    ctx.fillStyle = '#fff0b0';
                    ctx.fillRect(x+size*0.4, y-size*0.2, size*0.2, size*0.3);
                } else if(s.type === 'shell') {
                    ctx.fillStyle = '#33cc99';
                    ctx.beginPath();
                    ctx.ellipse(x+size/2, y+size/2, size/2.2, size/2.2, 0, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        // -------------------- SPIELLOGIK --------------------
        function updateRaceLogic() {
            // Rundenlogik: wenn Spieler-Z den Max-Z überschreitet
            if(player.z > MAX_Z) {
                player.z -= MAX_Z;
                player.lap++;
                if(player.lap >= totalLaps) {
                    raceActive = false;
                    document.getElementById('victoryOverlay').classList.add('show');
                }
                // Auch KI-Laps anpassen (einfach: reset, aber lap zählen)
                for(let ki of kies) {
                    if(ki.z > MAX_Z) {
                        ki.z -= MAX_Z;
                        ki.lap++;
                    }
                }
            }
            // Position berechnen (nach Fortschritt)
            let playerProgress = player.lap * MAX_Z + player.z;
            let all = [{name:'player', prog:playerProgress}];
            for(let ki of kies) {
                all.push({name:ki.color, prog: ki.lap * MAX_Z + ki.z});
            }
            all.sort((a,b)=>b.prog - a.prog);
            let pos = all.findIndex(p=>p.name==='player')+1;
            document.getElementById('position').innerHTML = pos;
            document.getElementById('lap').innerHTML = player.lap;
            document.getElementById('timer').innerHTML = raceTimer.toFixed(1);
        }
        
        function updatePlayer(dt) {
            if(!raceActive) return;
            // Automatikgas
            if(player.speed < player.maxSpeed) player.speed += player.acc * dt;
            else player.speed = player.maxSpeed;
            // Lenkung (steerInput wird extern gesetzt)
            let turn = steerValue * player.turnSpeed * (player.speed/player.maxSpeed) * dt;
            player.x += turn;
            player.x = Math.min(0.95, Math.max(-0.95, player.x));
            
            // Drift
            if(driftPressed && player.speed > 3) {
                player.drift = true;
                player.driftTimer += dt;
                let fill = Math.min(1, player.driftTimer / 0.7) * 100;
                document.getElementById('boostFill').style.width = fill+'%';
                if(player.driftTimer >= 0.7 && !player.driftBoostReady) {
                    player.driftBoostReady = true;
                }
                // Extra Lenkung im Drift
                player.x += steerValue * 1.0 * dt;
                player.x = Math.min(0.98, Math.max(-0.98, player.x));
            } else if(player.drift) {
                if(player.driftBoostReady) {
                    player.speed += 9;
                    player.driftBoostReady = false;
                }
                player.drift = false;
                player.driftTimer = 0;
                document.getElementById('boostFill').style.width = '0%';
            }
            
            player.z += player.speed * dt;
        }
        
        function updateKI(dt) {
            for(let ki of kies) {
                ki.z += ki.speed * dt;
                if(ki.z > MAX_Z) {
                    ki.z -= MAX_Z;
                    ki.lap++;
                }
                // Items benutzen
                if(ki.item && ki.cooldown <= 0) {
                    if(ki.item === 'banana') {
                        roadItems.push({ type: 'banana', z: ki.z - 2.5, x: ki.x, life: 8 });
                    } else if(ki.item === 'shell') {
                        roadItems.push({ type: 'shell', z: ki.z - 1.2, x: ki.x, life: 6 });
                    }
                    ki.item = null;
                    ki.cooldown = 2.5;
                }
                if(ki.cooldown > 0) ki.cooldown -= dt;
                
                // Item-Boxen sammeln (zufällig)
                let seg = getSegmentAtZ(ki.z);
                if(seg && seg.item === 'random' && Math.random() < 0.03) {
                    ki.item = Math.random() < 0.5 ? 'banana' : 'shell';
                    seg.item = null;
                }
            }
        }
        
        function updateItemsAndCollisions(dt) {
            // Spieler sammelt Item-Box
            let seg = getSegmentAtZ(player.z);
            if(seg && seg.item === 'random') {
                let r = Math.random();
                if(r < 0.34) player.currentItem = 'mushroom';
                else if(r < 0.67) player.currentItem = 'banana';
                else player.currentItem = 'shell';
                seg.item = null;
                let icon = { mushroom:'🍄', banana:'🍌', shell:'🐚' }[player.currentItem] || '📦';
                document.getElementById('itemIcon').innerHTML = icon;
            }
            // Kollision mit Straßen-Items
            for(let i=0; i<roadItems.length; i++) {
                let it = roadItems[i];
                let dz = Math.abs(it.z - player.z);
                let dx = Math.abs(it.x - player.x);
                if(dz < 1.1 && dx < 0.6) {
                    if(it.type === 'banana') player.speed *= 0.3;
                    if(it.type === 'shell') player.speed = 2;
                    roadItems.splice(i,1);
                    i--;
                }
            }
            // Kollision mit KI
            for(let ki of kies) {
                let dz = Math.abs(ki.z - player.z);
                if(dz < 1.0 && Math.abs(ki.x - player.x) < 0.7) {
                    player.speed *= 0.5;
                }
            }
            // Items Leben
            for(let i=0; i<roadItems.length; i++) {
                roadItems[i].life = (roadItems[i].life || 6) - dt;
                if(roadItems[i].life <= 0) roadItems.splice(i,1);
            }
        }
        
        function usePlayerItem() {
            if(!raceActive || !player.currentItem) return;
            if(player.currentItem === 'mushroom') {
                player.speed += 7;
                setTimeout(()=>{ if(raceActive) player.speed = Math.max(3, player.speed-7); }, 1800);
            } else if(player.currentItem === 'banana') {
                roadItems.push({ type: 'banana', z: player.z - 2.8, x: player.x, life: 8 });
            } else if(player.currentItem === 'shell') {
                roadItems.push({ type: 'shell', z: player.z - 0.8, x: player.x, life: 6 });
            }
            player.currentItem = null;
            document.getElementById('itemIcon').innerHTML = '📦';
        }
        
        // -------------------- STEUERUNG (Tastatur + Touch) --------------------
        let steerValue = 0;
        let driftPressed = false;
        
        function setSteer(val) {
            steerValue = Math.min(1, Math.max(-1, val));
        }
        
        // Tastatur
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') setSteer(-1);
            if(e.key === 'ArrowRight' || e.key === 'd') setSteer(1);
            if(e.key === ' ' || e.key === 'Shift') { driftPressed = true; e.preventDefault(); }
            if(e.key === 'e' || e.key === 'Control') { usePlayerItem(); e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') setSteer(0);
            if(e.key === ' ' || e.key === 'Shift') { driftPressed = false; e.preventDefault(); }
        });
        
        // Touch: Lenkzone
        const steerZone = document.getElementById('steerZone');
        let touchActive = false;
        function handleTouchSteer(clientX) {
            let rect = steerZone.getBoundingClientRect();
            let relativeX = (clientX - rect.left) / rect.width;
            let val = relativeX * 2 - 1;
            setSteer(Math.min(1, Math.max(-1, val)));
        }
        steerZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchActive = true;
            handleTouchSteer(e.touches[0].clientX);
        });
        steerZone.addEventListener('touchmove', (e) => {
            if(!touchActive) return;
            e.preventDefault();
            handleTouchSteer(e.touches[0].clientX);
        });
        steerZone.addEventListener('touchend', () => { setSteer(0); touchActive = false; });
        steerZone.addEventListener('mousedown', (e) => {
            touchActive = true;
            handleTouchSteer(e.clientX);
        });
        window.addEventListener('mouseup', () => { if(touchActive) { setSteer(0); touchActive = false; } });
        
        const driftBtn = document.getElementById('driftTouch');
        driftBtn.addEventListener('touchstart', (e) => { e.preventDefault(); driftPressed = true; });
        driftBtn.addEventListener('touchend', (e) => { e.preventDefault(); driftPressed = false; });
        driftBtn.addEventListener('mousedown', () => { driftPressed = true; });
        driftBtn.addEventListener('mouseup', () => { driftPressed = false; });
        
        const itemBtn = document.getElementById('itemTouch');
        itemBtn.addEventListener('click', () => usePlayerItem());
        itemBtn.addEventListener('touchstart', (e) => { e.preventDefault(); usePlayerItem(); });
        
        // -------------------- RENDERING LOOP --------------------
        let lastTimestamp = performance.now();
        
        function renderBackground() {
            // Himmel / Boden
            ctx.fillStyle = '#0a2f3a';
            ctx.fillRect(0, 0, W, H/2);
            ctx.fillStyle = '#4a7a5a';
            ctx.fillRect(0, H/2, W, H/2);
            // Sonne
            ctx.fillStyle = '#ffdd77';
            ctx.beginPath();
            ctx.arc(W-60, 50, 35, 0, 2*Math.PI);
            ctx.fill();
        }
        
        function gameLoop() {
            let now = performance.now();
            let dt = Math.min(0.033, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            
            if(raceActive) {
                raceTimer += dt;
                updatePlayer(dt);
                updateKI(dt);
                updateItemsAndCollisions(dt);
                updateRaceLogic();
            }
            
            renderBackground();
            renderRoad();
            renderSprites();
            
            // Fahrer-HUD
            ctx.font = "bold 14px monospace";
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 0;
            ctx.fillText("⚡ Drift & Boost", 20, 50);
            
            requestAnimationFrame(gameLoop);
        }
        
        // Reset vor Start
        player.z = 8;
        player.lap = 0;
        player.speed = 0;
        raceActive = true;
        raceTimer = 0;
        player.currentItem = null;
        document.getElementById('itemIcon').innerHTML = '📦';
        document.getElementById('boostFill').style.width = '0%';
        kies.forEach((ki,idx) => {
            ki.z = 25 + idx*22;
            ki.lap = 0;
            ki.item = null;
            ki.cooldown = 0;
        });
        roadItems = [];
        // Item-Boxen regenerieren
        for(let seg of segments) {
            if(seg.item === 'random') seg.item = 'random';
        }
        
        gameLoop();
    })();
</script>
</body>
</html>
