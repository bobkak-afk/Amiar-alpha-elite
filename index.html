<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SCUDERIA PRESTIGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #050505; --accent: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; height: 100vh; }

        /* LUXURY LOADING/MENU OVERLAY */
        #menu {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1.2s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo-main { font-size: 3.5rem; font-weight: 900; letter-spacing: 18px; color: var(--gold); 
                     text-shadow: 0 0 40px rgba(197,160,89,0.3); margin-bottom: 10px; }
        .logo-sub { font-size: 0.7rem; letter-spacing: 8px; opacity: 0.5; text-transform: uppercase; }

        .btn-play {
            padding: 22px 80px; background: none; border: 1px solid var(--gold);
            color: var(--gold); font-size: 1rem; font-weight: 900; letter-spacing: 5px;
            cursor: pointer; position: relative; overflow: hidden; transition: 0.4s;
            backdrop-filter: blur(5px);
        }
        .btn-play:active { background: var(--gold); color: black; transform: scale(0.95); }

        /* PRO HUD INTERFACE */
        #hud {
            position: absolute; inset: 0; pointer-events: none; z-index: 100;
            opacity: 0; transition: opacity 1.5s; padding: env(safe-area-inset-top, 40px) 40px;
        }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .stat-card { background: rgba(255,255,255,0.03); border-bottom: 2px solid var(--gold); 
                     padding: 15px 30px; backdrop-filter: blur(15px); }
        .stat-label { font-size: 0.5rem; letter-spacing: 3px; color: var(--gold); margin-bottom: 5px; }
        .stat-value { font-size: 1.5rem; font-weight: 900; }

        .speedo-container {
            position: absolute; bottom: 50px; right: 50px; text-align: right;
        }
        #speed-num { font-size: 6rem; font-weight: 900; line-height: 0.8; color: white; opacity: 0.9; }
        .unit { font-size: 1rem; color: var(--gold); letter-spacing: 5px; }

        /* TOUCH CONTROLS */
        .tap-area { position: absolute; top: 0; height: 100%; z-index: 50; }
        #L { left: 0; width: 35%; } #R { right: 0; width: 35%; } #G { left: 35%; width: 30%; }

        /* STAGE TEXT */
        #stage-text { position: fixed; top: 40%; width: 100%; text-align: center; font-size: 5rem;
                      font-weight: 900; color: white; opacity: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="logo-box">
            <div class="logo-main">SCUDERIA</div>
            <div class="logo-sub">Grand Prestige Infinity</div>
        </div>
        <button class="btn-play" onclick="startEliteRace()">ENGAGE MOTOR</button>
        <div style="margin-top: 100px; font-size: 0.5rem; opacity: 0.3; letter-spacing: 3px;">DESIGNED BY AMIAR KEMPF</div>
    </div>

    <div id="hud">
        <div class="hud-top">
            <div class="stat-card">
                <div class="stat-label">DRIVER STATUS</div>
                <div class="stat-value">A. KEMPF</div>
            </div>
            <div class="stat-card" style="border-bottom-color: var(--accent);">
                <div class="stat-label">TIME LIMIT</div>
                <div id="timer" class="stat-value">30</div>
            </div>
        </div>
        <div class="speedo-container">
            <div id="speed-num">0</div>
            <div class="unit">KM/H VELOCITY</div>
        </div>
    </div>

    <div id="stage-text">STAGE UP</div>

    <div id="L" class="tap-area"></div><div id="G" class="tap-area"></div><div id="R" class="tap-area"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.0/build/three.module.js';

        let scene, camera, renderer, car, grid, clock = new THREE.Clock();
        let speed = 0, rotation = 0, distance = 0, timeLeft = 30, isActive = false;
        let input = { l: false, r: false, g: false };
        let audioCtx, engineOsc, engineGain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            engineOsc = audioCtx.createOscillator();
            engineOsc.type = 'sawtooth';
            engineGain = audioCtx.createGain();
            engineGain.gain.value = 0;
            engineOsc.connect(engineGain);
            engineGain.connect(audioCtx.destination);
            engineOsc.start();
        }

        function createLuxuryCar() {
            const carGroup = new THREE.Group();
            
            // Body - Sleek Aero Shape
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.35, 2.8),
                new THREE.MeshStandardMaterial({ color: 0x080808, metalness: 1, roughness: 0.05 })
            );
            body.position.y = 0.4;
            carGroup.add(body);

            // Cockpit - Glass
            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.4, 1.2),
                new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, transparent: true, opacity: 0.7 })
            );
            cabin.position.set(0, 0.7, 0.2);
            carGroup.add(cabin);

            // Gold Detail Lines
            const trim = new THREE.Mesh(
                new THREE.BoxGeometry(1.22, 0.05, 2.82),
                new THREE.MeshStandardMaterial({ color: 0xc5a059, emissive: 0xc5a059, emissiveIntensity: 0.2 })
            );
            trim.position.y = 0.38;
            carGroup.add(trim);

            // Wheels (Simple but stylish)
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.2, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const positions = [[-0.65, 0.35, 0.9], [0.65, 0.35, 0.9], [-0.65, 0.35, -0.9], [0.65, 0.35, -0.9]];
            positions.forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(...pos);
                carGroup.add(w);
            });

            return carGroup;
        }

        function setupScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);

            const spotlight = new THREE.SpotLight(0xc5a059, 5);
            spotlight.position.set(0, 10, 10);
            scene.add(spotlight);

            // Floor - Reflection Look
            grid = new THREE.GridHelper(2000, 100, 0xc5a059, 0x111111);
            scene.add(grid);

            car = createLuxuryCar();
            scene.add(car);

            // Obstacles & Checkpoints
            const torGeo = new THREE.TorusGeometry(8, 0.1, 16, 100);
            const torMat = new THREE.MeshBasicMaterial({ color: 0xc5a059 });
            const goal = new THREE.Mesh(torGeo, torMat);
            goal.position.z = -150;
            scene.add(goal);
            window.goal = goal;

            // Input
            const t = (id, k) => {
                const el = document.getElementById(id);
                el.ontouchstart = (e) => { e.preventDefault(); input[k] = true; };
                el.ontouchend = () => input[k] = false;
            };
            t('L', 'l'); t('R', 'r'); t('G', 'g');

            animate();
            setInterval(() => { if(isActive && timeLeft > 0) timeLeft--; }, 1000);
        }

        function animate() {
            if(!isActive) return;
            requestAnimationFrame(animate);

            // Physics Pro
            if(input.g) {
                speed = THREE.MathUtils.lerp(speed, 1.1, 0.03);
                engineGain.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.1);
            } else {
                speed = THREE.MathUtils.lerp(speed, 0, 0.02);
                engineGain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.2);
            }

            if(input.l) { rotation += 0.045; car.rotation.z = 0.15; }
            else if(input.r) { rotation -= 0.045; car.rotation.z = -0.15; }
            else { car.rotation.z = 0; }

            car.position.x += Math.sin(rotation) * speed;
            car.position.z += Math.cos(rotation) * speed;
            car.rotation.y = rotation;
            
            // Engine Pitch
            engineOsc.frequency.setTargetAtTime(40 + (speed * 180), audioCtx.currentTime, 0.1);

            // Goal Collision
            if(car.position.distanceTo(window.goal.position) < 10) {
                timeLeft += 10;
                window.goal.position.z -= 400;
                window.goal.position.x = car.position.x + (Math.random()-0.5)*100;
                document.getElementById('stage-text').style.opacity = 1;
                setTimeout(() => document.getElementById('stage-text').style.opacity = 0, 800);
            }

            // High-End Camera
            camera.fov = 60 + (speed * 35);
            camera.updateProjectionMatrix();
            const camOffset = new THREE.Vector3(-Math.sin(rotation)*9, 4, -Math.cos(rotation)*9);
            camera.position.lerp(car.position.clone().add(camOffset), 0.1);
            camera.lookAt(car.position);

            // HUD
            document.getElementById('speed-num').innerText = Math.floor(speed * 395);
            document.getElementById('timer').innerText = timeLeft;
            document.getElementById('timer').style.color = timeLeft < 10 ? 'red' : 'white';

            if(timeLeft <= 0) location.reload();

            renderer.render(scene, camera);
        }

        window.startEliteRace = () => {
            initAudio();
            setupScene();
            document.getElementById('menu').style.transform = "translateY(-100%)";
            document.getElementById('hud').style.opacity = 1;
            isActive = true;
        };
    </script>
</body>
</html>
