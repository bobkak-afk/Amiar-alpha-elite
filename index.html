<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SCUDERIA INFINITY</title>
    
    <style>
        body { 
            margin: 0; background: #000; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none; -webkit-user-select: none;
        }
        
        /* HUD Design */
        #ui {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 20px; z-index: 10; pointer-events: none;
        }
        .speed { font-size: 2.5rem; font-weight: 900; color: #d4af37; }

        /* Touch-Zonen (Unsichtbare Steuerung) */
        #touch-left { position: absolute; left: 0; top: 0; width: 30%; height: 100%; z-index: 20; }
        #touch-right { position: absolute; right: 30%; top: 0; width: 40%; height: 100%; z-index: 20; }
        #touch-gas { position: absolute; right: 0; top: 0; width: 30%; height: 100%; z-index: 20; background: rgba(212,175,55,0.05); }

        #label { color: rgba(255,255,255,0.5); font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="label">SCUDERIA INFINITY</div>
        <div id="speedDisplay" class="speed">000</div>
    </div>

    <div id="touch-left"></div> <div id="touch-right"></div> <div id="touch-gas"></div> <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.150.0/build/three.module.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio); // Scharfes Bild auf iPhone
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Licht & Welt
        const sun = new THREE.DirectionalLight(0xd4af37, 1.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040));
        scene.add(new THREE.GridHelper(200, 50, 0x333333, 0x111111));

        // Das Auto
        const car = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.4, 2),
            new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.9, roughness: 0.1 })
        );
        body.position.y = 0.2;
        car.add(body);
        scene.add(car);

        // Steuerungsvariablen
        let speed = 0, rotation = 0;
        let input = { left: false, right: false, gas: false };

        // Touch Events für iPhone
        const setupTouch = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
            el.addEventListener('touchend', () => input[key] = false);
        };

        setupTouch('touch-left', 'left');
        setupTouch('touch-right', 'right');
        setupTouch('touch-gas', 'gas');

        function update() {
            // iPhone Physik: Sanfteres Beschleunigen
            if (input.gas) speed = THREE.MathUtils.lerp(speed, 0.7, 0.05);
            else speed = THREE.MathUtils.lerp(speed, 0, 0.03);

            let steerPower = input.gas ? 0.06 : 0.03; // Driften wenn Gas gegeben wird
            if (input.left) rotation += steerPower;
            if (input.right) rotation -= steerPower;

            car.position.x += Math.sin(rotation) * speed;
            car.position.z += Math.cos(rotation) * speed;
            car.rotation.y = rotation;

            // Kamera-Follow
            const camOffset = new THREE.Vector3(-Math.sin(rotation) * 6, 3, -Math.cos(rotation) * 6);
            camera.position.lerp(car.position.clone().add(camOffset), 0.1);
            camera.lookAt(car.position);

            document.getElementById('speedDisplay').innerText = Math.floor(speed * 400).toString().padStart(3, '0');

            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }
        update();

        // Resize bei Orientierungswechsel (Portrait/Landscape)
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
