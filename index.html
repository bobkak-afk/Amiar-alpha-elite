<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMIAR KEMPF | ARCADE VELOCITY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Barlow+Condensed:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ferrari-red: #cc0000;
            --gold: #ffcf40;
            --carbon: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Barlow Condensed', sans-serif; overflow: hidden; touch-action: none; }
        
        body { background: var(--carbon); color: white; height: 100vh; display: flex; justify-content: center; }

        .app-shell {
            width: 100%; max-width: 450px; height: 100vh;
            display: flex; flex-direction: column; position: relative;
            border-left: 2px solid #222; border-right: 2px solid #222;
        }

        /* --- UI HEADER --- */
        .game-header {
            padding: 40px 20px 10px; background: rgba(0,0,0,0.8);
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .brand { font-style: italic; font-size: 1.5rem; letter-spacing: -1px; }
        .brand span { color: var(--ferrari-red); }

        .stats { font-family: 'Orbitron'; color: var(--gold); font-size: 1rem; text-align: right; }

        /* --- GAME CANVAS --- */
        #gameCanvas {
            flex: 1; background: #222; width: 100%; display: block;
        }

        /* --- CONTROLS --- */
        .controls {
            height: 150px; background: rgba(0,0,0,0.9);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); border-top: 2px solid var(--ferrari-red);
        }
        .ctrl-btn {
            width: 80px; height: 80px; background: #333; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; color: white; border: 3px solid var(--ferrari-red);
            box-shadow: 0 0 20px rgba(204, 0, 0, 0.3); cursor: pointer;
        }
        .ctrl-btn:active { background: var(--ferrari-red); transform: scale(0.9); }

        /* --- OVERLAYS --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            padding: 40px;
        }
        .btn-start {
            background: var(--ferrari-red); color: white; border: none; padding: 20px 40px;
            font-size: 1.5rem; font-weight: 900; font-style: italic; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            margin-top: 20px; cursor: pointer;
        }

        .credits {
            position: absolute; bottom: 160px; width: 100%; text-align: center;
            font-size: 0.7rem; color: #555; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="game-header">
        <div class="brand">AMIAR <span>KEMPF</span></div>
        <div class="stats">SPEED: <span id="speedUI">0</span> KM/H</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="credits">Produziert von Wowa & Amiar Kempf</div>

    <div id="start-screen" class="overlay">
        <h1 style="font-size: 3rem; font-style: italic; color: var(--ferrari-red);">SCUDERIA ARCADE</h1>
        <p style="opacity: 0.6; margin-top: 10px;">Weiche Hindernissen aus & sammle Gold!</p>
        <button class="btn-start" onclick="initGame()">MOTOR STARTEN</button>
    </div>

    <div id="game-over" class="overlay" style="display: none;">
        <h1 style="font-size: 2.5rem; font-style: italic;">ZIELGERADE</h1>
        <p style="opacity: 0.6;">Deine Endgeschwindigkeit:</p>
        <h2 id="final-speed" style="font-size: 4rem; color: var(--gold); font-family: 'Orbitron';">0</h2>
        <button class="btn-start" onclick="location.reload()">NEUSTART</button>
    </div>

    <div class="controls">
        <div class="ctrl-btn" id="btn-left">◀</div>
        <div class="ctrl-btn" id="btn-right">▶</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const speedUI = document.getElementById('speedUI');

    let gameActive = false;
    let score = 0;
    let player = { x: 0, y: 0, w: 50, h: 80, speed: 5 };
    let obstacles = [];
    let items = [];
    let frame = 0;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        player.x = canvas.width / 2 - player.w / 2;
        player.y = canvas.height - 120;
    }

    window.addEventListener('resize', resize);
    resize();

    // Steuerung
    let moveLeft = false;
    let moveRight = false;

    document.getElementById('btn-left').onpointerdown = () => moveLeft = true;
    document.getElementById('btn-left').onpointerup = () => moveLeft = false;
    document.getElementById('btn-right').onpointerdown = () => moveRight = true;
    document.getElementById('btn-right').onpointerup = () => moveRight = false;
    
    // Tastatur Support
    window.onkeydown = (e) => {
        if(e.key === "ArrowLeft") moveLeft = true;
        if(e.key === "ArrowRight") moveRight = true;
    };
    window.onkeyup = (e) => {
        if(e.key === "ArrowLeft") moveLeft = false;
        if(e.key === "ArrowRight") moveRight = false;
    };

    function initGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true;
        score = 0;
        obstacles = [];
        items = [];
        loop();
    }

    function spawnEntity() {
        if (frame % 60 === 0) {
            obstacles.push({ x: Math.random() * (canvas.width - 40), y: -100, w: 40, h: 40, type: 'rock' });
        }
        if (frame % 150 === 0) {
            items.push({ x: Math.random() * (canvas.width - 30), y: -100, w: 30, h: 30, type: 'gold' });
        }
    }

    function loop() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Hintergrund (Strasse)
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.setLineDash([20, 20]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();

        // Spieler Steuerung
        if (moveLeft && player.x > 0) player.x -= 7;
        if (moveRight && player.x < canvas.width - player.w) player.x += 7;

        // Spieler zeichnen (Ferrari Style Car)
        ctx.fillStyle = '#cc0000'; // Rosso Corsa
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#cc0000';
        ctx.fillRect(player.x, player.y, player.w, player.h); // Auto Körper
        ctx.fillStyle = '#000';
        ctx.fillRect(player.x-5, player.y+10, 10, 20); // Reifen L
        ctx.fillRect(player.x+player.w-5, player.y+10, 10, 20); // Reifen R
        ctx.shadowBlur = 0;

        // Hindernisse bewegen & zeichnen
        obstacles.forEach((obs, i) => {
            obs.y += 5 + (score / 500);
            ctx.fillStyle = '#555';
            ctx.beginPath();
            ctx.arc(obs.x + 20, obs.y + 20, 20, 0, Math.PI*2);
            ctx.fill();

            // Kollision
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x && player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameOver();
            }
            if (obs.y > canvas.height) obstacles.splice(i, 1);
        });

        // Items bewegen & zeichnen
        items.forEach((item, i) => {
            item.y += 4;
            ctx.fillStyle = '#ffcf40';
            ctx.shadowBlur = 10; ctx.shadowColor = '#ffcf40';
            ctx.beginPath();
            ctx.arc(item.x + 15, item.y + 15, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Einsammeln
            if (player.x < item.x + item.w && player.x + player.w > item.x && player.y < item.y + item.h && player.y + player.h > item.y) {
                items.splice(i, 1);
                score += 150;
            }
        });

        score += 1;
        speedUI.innerText = Math.floor(score / 5);
        frame++;
        spawnEntity();
        requestAnimationFrame(loop);
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('game-over').style.display = 'flex';
        document.getElementById('final-speed').innerText = Math.floor(score / 5);
    }
</script>
</body>
</html>
