<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050506">
    
    <title>AMIAR KEMPF | ELITE VELOCITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #00f2ff;
            --gold: #d4af37;
            --red: #ff0044;
            --bg: #050506;
            --card: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: white; height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            /* Verhindert Pull-to-Refresh auf Mobile */
            overscroll-behavior-y: contain;
        }

        /* Full App Shell */
        .app-shell {
            width: 100vw; height: 100vh; max-width: 500px;
            background: radial-gradient(circle at top, #121214, #050506);
            position: relative; display: flex; flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05);
        }

        /* --- NATIVE HEADER --- */
        .header {
            padding: 60px 20px 15px; text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; font-size: 1.8rem; letter-spacing: 4px; color: white; text-shadow: 0 0 15px var(--neon); }
        .sub-logo { font-size: 0.6rem; color: var(--gold); font-family: 'Orbitron'; letter-spacing: 3px; margin-top: 5px; opacity: 0.8; }

        /* --- RACE TRACK --- */
        .track { height: 120px; width: 100%; position: relative; border-bottom: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .lane { height: 40px; border-bottom: 1px dashed rgba(255,255,255,0.05); position: relative; }
        .car { position: absolute; left: 5%; font-size: 1.8rem; transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1); filter: drop-shadow(0 0 8px var(--neon)); }
        .finish { position: absolute; right: 10px; height: 100%; width: 6px; background: repeating-linear-gradient(0deg, #fff 0 10px, #000 10px 20px); opacity: 0.2; }

        /* --- GAME SCREENS --- */
        .screen { display: none; flex: 1; padding: 25px; flex-direction: column; overflow-y: auto; }
        .active { display: flex; animation: fadeUp 0.4s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- COMPONENTS --- */
        .hud-stats { display: flex; justify-content: space-around; margin: 15px 0; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--neon); }
        
        .timer-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 30px; }
        .timer-bar { height: 100%; width: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.1s linear; }

        .item-box { 
            width: 70px; height: 70px; background: var(--card); border: 2px solid var(--gold); 
            border-radius: 15px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }

        .q-text { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 25px; line-height: 1.2; }
        
        .btn-opt { 
            background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 12px; font-weight: 700; font-size: 1rem; color: white; cursor: pointer; transition: 0.2s;
        }
        .btn-opt:active { background: var(--neon); color: black; transform: scale(0.98); }

        .btn-action { 
            background: linear-gradient(135deg, var(--neon), #0072ff); color: white;
            padding: 22px; border-radius: 20px; border: none; font-family: 'Orbitron'; 
            font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: auto;
        }

        /* Leaderboard Style */
        .rank-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--neon); }

        footer { text-align: center; padding: 20px; font-size: 0.6rem; opacity: 0.4; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="track" id="track">
        <div class="finish"></div>
        <div class="lane"><div id="car-0" class="car">🏎️</div></div>
        <div class="lane"><div id="car-1" class="car">🚙</div></div>
    </div>

    <header class="header">
        <div class="logo">AMIAR KEMPF</div>
        <div class="sub-logo">ELITE VELOCITY ULTIMATE</div>
    </header>

    <div class="hud-stats">
        <span>RPM: <span id="rpm">0000</span></span>
        <span>POS: <span id="pos">1/2</span></span>
        <span>XP: <span id="xp">0</span></span>
    </div>

    <div id="screen-home" class="screen active">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <h1 style="font-family:Orbitron; font-size:1rem; text-align:center; color: var(--gold);">MISSION CONTROL</h1>
            <p style="text-align:center; opacity:0.6; font-size:0.8rem; margin-top:10px;">Bist du bereit für das Elite-System?</p>
        </div>
        <button class="btn-action" onclick="startGame()">SYSTEM STARTEN</button>
        <footer>V3.2 GLOBAL BUILD</footer>
    </div>

    <div id="screen-race" class="screen">
        <div id="item-slot" class="item-box">?</div>
        <div class="timer-container"><div id="timer-bar" class="timer-bar"></div></div>
        <div id="q-container">
            <p class="q-text" id="q-text">Lade Engine...</p>
            <div id="options-grid" style="display:flex; flex-direction:column;"></div>
        </div>
        <div id="feedback" style="display:none; text-align:center;">
            <h2 id="fb-title" style="font-family:Orbitron; margin-bottom:10px;"></h2>
            <p id="fb-fact" style="font-size:0.9rem; opacity:0.7; margin-bottom:30px;"></p>
            <button class="btn-action" onclick="handleNext()">NÄCHSTE RUNDE</button>
        </div>
    </div>

    <div id="screen-end" class="screen">
        <h2 style="font-family:Orbitron; text-align:center; margin-bottom:20px; color:var(--gold);">GLOBAL PODIUM</h2>
        <div id="leaderboard-list"></div>
        <button class="btn-action" onclick="location.reload()" style="margin-top:20px;">RE-ENTRY</button>
    </div>
</div>

<script>
    // --- APP CORE & PERSISTENCE ---
    const DB = [
        { q: "Was ist das Herzstück des Bugatti Chiron?", o: ["V8 Bi-Turbo", "W16 Quad-Turbo", "V12 Saugmotor", "Elektro-Antrieb"], c: 1, e: "Der W16 liefert unglaubliche 1500 PS." },
        { q: "Welches Material ist Standard im Elite-Rennsport?", o: ["Aluminium", "Carbon/Kohlefaser", "Titan", "Stahl"], c: 1, e: "Carbon bietet maximale Steifigkeit bei minimalem Gewicht." },
        { q: "Welches Krypto-Asset gilt als 'Digitales Gold'?", o: ["Ethereum", "Solana", "Bitcoin", "Tether"], c: 2, e: "Bitcoin wird aufgrund seiner Knappheit so genannt." },
        { q: "In welchem Jahr knackte Amiar Kempf die Elite-Ränge?", o: ["2023", "2024", "2025", "2026"], c: 3, e: "2026 ist das Jahr der globalen Dominanz." },
        { q: "Welche Stadt ist das Mekka der Hypercars?", o: ["Berlin", "Dubai", "Monaco", "Beides (Dubai & Monaco)"], c: 3, e: "Dubai und Monaco sind weltweit führend." }
    ];

    const ITEMS = [
        { n: "NITRO", s: "🚀", d: "Doppelte KM/H" },
        { n: "SHIELD", s: "🛡️", d: "Fehlerschutz" },
        { n: "TRAP", s: "🛢️", d: "Gegner-Bremse" }
    ];

    let state = {
        players: [
            { name: "Amiar Kempf", score: 0, car: "🏎️", item: null },
            { name: "Global Rival", score: 0, car: "🚙", item: null }
        ],
        curP: 0, curQ: 0, timer: null, time: 10, audio: null
    };

    // --- ENGINE SOUND ---
    function playEngine(pitch = 100) {
        if(!state.audio) {
            state.audio = new (window.AudioContext || window.webkitAudioContext)();
        }
        const osc = state.audio.createOscillator();
        const g = state.audio.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(pitch, state.audio.currentTime);
        g.gain.setValueAtTime(0.05, state.audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, state.audio.currentTime + 0.5);
        osc.connect(g);
        g.connect(state.audio.destination);
        osc.start();
        osc.stop(state.audio.currentTime + 0.5);
    }

    // --- NAVIGATION ---
    function nav(s) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-' + s).classList.add('active');
    }

    // --- GAME ENGINE ---
    function startGame() {
        state.curP = 0;
        state.players.forEach(p => p.score = 0);
        updateTrack();
        startTurn();
    }

    function startTurn() {
        state.curQ = 0;
        nav('race');
        loadQ();
    }

    function loadQ() {
        if(state.curQ >= 3) { nextPilot(); return; }
        
        const q = DB[Math.floor(Math.random() * DB.length)];
        document.getElementById('q-container').style.display = 'block';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('q-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        q.o.forEach((o, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-opt';
            btn.innerText = o;
            btn.onclick = () => check(i, q.c, q.e);
            grid.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(state.timer);
        state.time = 10;
        state.timer = setInterval(() => {
            state.time -= 0.1;
            document.getElementById('timer-bar').style.width = (state.time * 10) + "%";
            document.getElementById('rpm').innerText = Math.floor(2000 + (10 - state.time) * 600);
            if(state.time <= 0) check(-1, 0, "Zeit abgelaufen! Motor überhitzt.");
        }, 100);
    }

    function check(idx, correct, fact) {
        clearInterval(state.timer);
        document.getElementById('q-container').style.display = 'none';
        document.getElementById('feedback').style.display = 'block';
        
        const fbTitle = document.getElementById('fb-title');
        const fbFact = document.getElementById('fb-fact');
        fbFact.innerText = fact;

        if(idx === correct) {
            fbTitle.innerText = "PERFEKTER START!";
            fbTitle.style.color = varName('--neon');
            let points = Math.round(state.time * 55);
            
            // Item Check
            if(state.players[state.curP].item && state.players[state.curP].item.n === "NITRO") {
                points *= 2;
                state.players[state.curP].item = null;
            }

            state.players[state.curP].score += points;
            playEngine(150 + (state.time * 10));
            updateTrack();
            
            // Random Item Drop
            if(Math.random() > 0.6) {
                state.players[state.curP].item = ITEMS[Math.floor(Math.random()*ITEMS.length)];
            }
        } else {
            fbTitle.innerText = "CRASH!";
            fbTitle.style.color = varName('--red');
            if(window.navigator.vibrate) window.navigator.vibrate(200);
        }
        updateHUD();
    }

    function handleNext() {
        state.curQ++;
        loadQ();
    }

    function updateTrack() {
        state.players.forEach((p, i) => {
            const car = document.getElementById('car-' + i);
            const move = Math.min((p.score / 1500) * 85 + 5, 88);
            car.style.left = move + "%";
        });
    }

    function updateHUD() {
        document.getElementById('xp').innerText = state.players[0].score;
        const itemSlot = document.getElementById('item-slot');
        const pItem = state.players[state.curP].item;
        itemSlot.innerText = pItem ? pItem.s : "?";
        itemSlot.style.borderColor = pItem ? varName('--neon') : varName('--gold');
    }

    function nextPilot() {
        state.curP++;
        if(state.curP < state.players.length) {
            alert("PILOTENWECHSEL: " + state.players[state.curP].name + " übernimmt!");
            startTurn();
        } else {
            showLeaderboard();
        }
    }

    function showLeaderboard() {
        nav('end');
        const list = document.getElementById('leaderboard-list');
        const sorted = [...state.players].sort((a,b) => b.score - a.score);
        list.innerHTML = sorted.map((p, i) => `
            <div class="rank-item">
                <span><b>#${i+1}</b> ${p.name}</span>
                <span style="color:var(--neon); font-family:Orbitron;">${p.score} KM/H</span>
            </div>
        `).join('');
        
        // Persistenz (Local Storage)
        localStorage.setItem('elite_highscore', sorted[0].score);
    }

    function varName(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    // Initial HUD
    updateHUD();
</script>

</body>
</html>
