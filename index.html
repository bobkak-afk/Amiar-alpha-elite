<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AMIAR KEMPF | ELITE VELOCITY PLATINUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --gold-bright: #f3d091;
            --neon: #00f2ff;
            --bg: #050505;
            --surface: rgba(20, 20, 22, 0.8);
            --border: rgba(197, 160, 89, 0.2);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1c 0%, var(--bg) 80%);
        }

        /* --- GLOBAL SHELL --- */
        .app-container {
            width: 100vw; height: 100vh; display: flex; flex-direction: column;
            max-width: 500px; margin: 0 auto; position: relative;
            border-left: 1px solid rgba(255,255,255,0.03); border-right: 1px solid rgba(255,255,255,0.03);
        }

        /* --- PERSISTENT NAVIGATION (BOTTOM) --- */
        .global-nav {
            position: absolute; bottom: 0; left: 0; right: 0;
            height: calc(70px + var(--safe-bottom));
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: var(--safe-bottom); z-index: 1000;
        }

        .nav-item {
            color: rgba(255,255,255,0.5); font-family: 'Orbitron'; font-size: 0.6rem;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 1.2rem; }

        /* --- HEADER --- */
        .header {
            padding: calc(40px + var(--safe-top)) 25px 20px;
            text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .brand-logo { 
            font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; letter-spacing: 6px; 
            background: linear-gradient(to right, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- RACE TRACK (MODERNIZED) --- */
        .track-view { height: 100px; background: rgba(0,0,0,0.5); position: relative; padding: 10px; }
        .car-lane { height: 35px; border-bottom: 1px solid rgba(255,255,255,0.03); position: relative; }
        .car { position: absolute; left: 5%; font-size: 1.6rem; transition: 1s ease-out; filter: drop-shadow(0 0 10px var(--gold)); }

        /* --- SCREENS --- */
        .screen { display: none; flex: 1; padding: 30px 25px; flex-direction: column; overflow-y: auto; padding-bottom: 100px; }
        .screen.active { display: flex; animation: screenIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes screenIn { from { opacity: 0; transform: translateY(20px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* --- PREMIUM COMPONENTS --- */
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--gold), #8a6d3b);
            color: black; border: none; padding: 22px; border-radius: 18px;
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem;
            letter-spacing: 2px; cursor: pointer; transition: 0.3s; width: 100%;
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.2);
        }
        .btn-premium:active { transform: scale(0.97); filter: brightness(1.2); }

        .btn-ghost {
            background: transparent; border: 1px solid var(--border); color: var(--gold);
            padding: 15px; border-radius: 15px; font-family: 'Orbitron'; font-size: 0.7rem;
            cursor: pointer; width: 100%; margin-bottom: 10px;
        }

        /* --- QUIZ UI --- */
        .question-title { font-size: 1.6rem; font-weight: 800; text-align: center; margin-bottom: 30px; line-height: 1.2; letter-spacing: -0.5px; }
        .option-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            padding: 20px; border-radius: 20px; margin-bottom: 12px; cursor: pointer;
            transition: 0.2s; font-weight: 500; font-size: 1.05rem;
        }
        .option-card:active { background: var(--gold); color: black; border-color: var(--gold); }

        .correct { background: #2ecc71 !important; color: black; }
        .wrong { background: #e74c3c !important; }

        .timer-line { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-bottom: 30px; position: relative; }
        .timer-fill { height: 100%; width: 100%; background: var(--gold); box-shadow: 0 0 15px var(--gold); transition: width 0.1s linear; }

        /* HUD STATS */
        .hud-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .hud-val { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--gold); }

    </style>
</head>
<body>

<div class="app-container">
    <div class="track-view" id="track">
        <div class="car-lane"><div id="car-0" class="car">🏎️</div></div>
        <div class="car-lane"><div id="car-1" class="car">🚙</div></div>
    </div>

    <header class="header">
        <div class="brand-logo">AMIAR KEMPF</div>
        <div style="font-size: 0.5rem; letter-spacing: 4px; opacity: 0.5; margin-top: 5px;">VELOCITY PLATINUM</div>
    </header>

    <div id="screen-home" class="screen active">
        <div class="card" style="text-align: center;">
            <p style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: var(--gold); margin-bottom: 10px;">Status: Bereit</p>
            <h2 style="font-family: Orbitron; margin-bottom: 15px;">ELITE SYSTEM</h2>
            <p style="font-size: 0.9rem; opacity: 0.6;">Willkommen im exklusiven Racing-Modul. Dominiere das Feld durch Wissen und Speed.</p>
        </div>
        <button class="btn-premium" onclick="startGame()">MISSION STARTEN</button>
        <button class="btn-ghost" style="margin-top: 15px;" onclick="nav('leader')">RANGLISTE</button>
    </div>

    <div id="screen-race" class="screen">
        <div class="hud-grid">
            <div class="card" style="padding: 10px; margin: 0; text-align: center;">
                <span style="font-size: 0.5rem; display: block; opacity: 0.5;">SPEED</span>
                <span class="hud-val" id="hud-speed">0 KM/H</span>
            </div>
            <div id="item-slot" class="card" style="padding: 10px; margin: 0; text-align: center; border-color: var(--gold);">
                <span style="font-size: 0.5rem; display: block; opacity: 0.5;">ITEM</span>
                <span class="hud-val" id="hud-item">EMPTY</span>
            </div>
        </div>

        <div class="timer-line"><div id="timer-bar" class="timer-fill"></div></div>

        <div id="game-ui">
            <h1 class="question-title" id="q-text">Lade Engine...</h1>
            <div id="options-grid"></div>
        </div>

        <div id="feedback" style="display:none; text-align:center;">
            <h2 id="fb-title" style="font-family:Orbitron; margin-bottom:15px;"></h2>
            <p id="fb-fact" style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 40px; line-height: 1.5;"></p>
            <button class="btn-premium" onclick="handleNext()">NÄCHSTER SEKTOR</button>
        </div>
    </div>

    <div id="screen-leader" class="screen">
        <h2 style="font-family: Orbitron; text-align: center; margin-bottom: 30px;">HALL OF FAME</h2>
        <div id="leader-list"></div>
        <button class="btn-premium" style="margin-top: 20px;" onclick="location.reload()">NEUSTART</button>
    </div>

    <nav class="global-nav">
        <div class="nav-item" onclick="goBack()">
            <span class="nav-icon">←</span>
            <span>Zurück</span>
        </div>
        <div class="nav-item" onclick="nav('home')">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="nav('leader')">
            <span class="nav-icon">🏆</span>
            <span>Elite</span>
        </div>
    </nav>
</div>

<script>
    const DB = [
        { q: "Welches Material reduziert das Gewicht eines Hypercars am stärksten?", o: ["Aluminium", "Carbon/Magnesium", "Titan", "Stahl"], c: 1, e: "Carbon ist der Goldstandard für Elite-Fahrzeuge." },
        { q: "Was bewirkt ein 'Downforce' Aerodynamik-Kit?", o: ["Mehr Speed", "Mehr Grip in Kurven", "Weniger Verbrauch", "Drift Modus"], c: 1, e: "Anpressdruck sorgt für extreme Kurvengeschwindigkeiten." },
        { q: "Welche Stadt ist bekannt für die höchste Dichte an Supercars?", o: ["Berlin", "London", "Dubai", "New York"], c: 2, e: "Dubai ist die Welthauptstadt der automobilen Elite." },
        { q: "In welchem Jahr wurde die Marke Ferrari gegründet?", o: ["1939", "1947", "1955", "1963"], c: 1, e: "1947 rollte der erste echte Ferrari vom Band." }
    ];

    let state = {
        players: [{ name: "Amiar Kempf", score: 0 }, { name: "Rival", score: 0 }],
        curP: 0, curQ: 0, time: 10, timer: null, screenHistory: ['home']
    };

    // --- NAVIGATION LOGIC ---
    function nav(s) {
        state.screenHistory.push(s);
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('screen-' + s).classList.add('active');
        
        // Aktive Nav-Items markieren
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    }

    function goBack() {
        if(state.screenHistory.length > 1) {
            state.screenHistory.pop();
            const prev = state.screenHistory[state.screenHistory.length - 1];
            nav(prev);
            state.screenHistory.pop(); // Verhindert Duplikate in der History
        }
    }

    // --- GAME ENGINE ---
    function startGame() {
        state.curP = 0;
        state.players.forEach(p => p.score = 0);
        updateTrack();
        startTurn();
    }

    function startTurn() {
        state.curQ = 0;
        nav('race');
        loadQ();
    }

    function loadQ() {
        if(state.curQ >= 3) { nextPilot(); return; }
        
        const q = DB[Math.floor(Math.random() * DB.length)];
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('q-text').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        q.o.forEach((o, i) => {
            const btn = document.createElement('div');
            btn.className = 'option-card';
            btn.innerText = o;
            btn.onclick = () => check(i, q.c, q.e);
            grid.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(state.timer);
        state.time = 10;
        state.timer = setInterval(() => {
            state.time -= 0.1;
            document.getElementById('timer-bar').style.width = (state.time * 10) + "%";
            if(state.time <= 0) check(-1, 0, "Zeitüberschreitung im Sektor.");
        }, 100);
    }

    function check(idx, correct, fact) {
        clearInterval(state.timer);
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('feedback').style.display = 'block';
        
        const fbTitle = document.getElementById('fb-title');
        document.getElementById('fb-fact').innerText = fact;

        if(idx === correct) {
            fbTitle.innerText = "EXZELLENT";
            fbTitle.style.color = "#2ecc71";
            state.players[state.curP].score += Math.round(state.time * 60);
            updateTrack();
        } else {
            fbTitle.innerText = "SEKTOR-FEHLER";
            fbTitle.style.color = "#e74c3c";
        }
        document.getElementById('hud-speed').innerText = state.players[state.curP].score + " KM/H";
    }

    function handleNext() {
        state.curQ++;
        loadQ();
    }

    function updateTrack() {
        state.players.forEach((p, i) => {
            const car = document.getElementById('car-' + i);
            const pos = Math.min((p.score / 1500) * 85 + 5, 90);
            car.style.left = pos + "%";
        });
    }

    function nextPilot() {
        state.curP++;
        if(state.curP < state.players.length) {
            alert("Nächster Pilot übernimmt das Cockpit.");
            startTurn();
        } else {
            showLeader();
        }
    }

    function showLeader() {
        nav('leader');
        const list = document.getElementById('leader-list');
        const sorted = [...state.players].sort((a,b) => b.score - a.score);
        list.innerHTML = sorted.map((p, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid var(--gold);">
                <span><b>#${i+1}</b> ${p.name}</span>
                <span class="hud-val">${p.score} KM/H</span>
            </div>
        `).join('');
    }

</script>

</body>
</html>
