<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CANVAS RACER | Classic 3D Software Renderer</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a1f1a 0%, #030c0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }
        .game-container {
            position: relative;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 4px #ffcc44, 0 0 0 8px #1e2a2a;
            background: #000;
        }
        canvas {
            display: block;
            border-radius: 28px;
            cursor: pointer;
            width: 100%;
            height: auto;
        }
        .ui-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
            text-shadow: 2px 2px 0 #000;
            font-weight: bold;
        }
        .panel {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 60px;
            color: #ffdd88;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,215,0,0.4);
        }
        .controls {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 10px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            pointer-events: none;
            z-index: 20;
        }
        button, .touch-steer {
            pointer-events: auto;
            background: #1e2f3a;
            border: none;
            font-size: 1.2rem;
            padding: 8px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 0 #0a1217;
            transition: 0.05s linear;
            font-family: monospace;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a1217;
        }
        .drift-btn {
            background: #ff8800;
            color: #1e1e1e;
            box-shadow: 0 4px 0 #aa5500;
        }
        .item-btn {
            background: #44aa66;
        }
        .touch-steer {
            width: 200px;
            background: #2c3e2f;
            text-align: center;
        }
        @media (max-width: 700px) {
            .panel { font-size: 0.8rem; padding: 4px 12px; }
            button, .touch-steer { padding: 6px 14px; font-size: 0.9rem; }
            .touch-steer { width: 140px; }
        }
        .boost-bar {
            position: absolute;
            bottom: 85px;
            left: 20px;
            width: 160px;
            height: 8px;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid gold;
            pointer-events: none;
        }
        .boost-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa33, #ffff88);
        }
        .item-icon {
            position: absolute;
            bottom: 85px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: #000000aa;
            backdrop-filter: blur(4px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 1px solid gold;
            pointer-events: none;
        }
        .victory {
            position: absolute;
            inset: 0;
            background: #000000cc;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: gold;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
            text-align: center;
            border-radius: 28px;
        }
        .victory.show {
            opacity: 1;
            pointer-events: auto;
        }
        .restart {
            margin-top: 30px;
            background: gold;
            color: black;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gameCanvas" width="800" height="600" style="width:100%; height:auto; max-width:1000px; aspect-ratio:800/600"></canvas>
    <div class="ui-overlay">
        <div class="panel">🏁 RUNDE <span id="lap">0</span>/3</div>
        <div class="panel">🥇 POS <span id="position">1</span> &nbsp; ⏱️ <span id="timer">0.0</span>s</div>
    </div>
    <div class="boost-bar"><div class="boost-fill" id="boostFill"></div></div>
    <div class="item-icon" id="itemIcon">📦</div>
    <div class="controls">
        <div class="touch-steer" id="steerZone">◀ 🏎️ ▶</div>
        <button id="driftTouch" class="drift-btn">🌀 DRIFT</button>
        <button id="itemTouch" class="item-btn">✨ ITEM</button>
    </div>
    <div id="victoryOverlay" class="victory">
        🏆 SIEG! 🏆<br>
        <div class="restart" onclick="location.reload()">🏁 NEUSTART</div>
    </div>
</div>

<script>
    (function(){
        // ---------- KONFIGURATION (Software 3D) ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W = 800, H = 600;
        canvas.width = W; canvas.height = H;
        
        // Kamera & Projektion
        let camX = 0, camY = 0;       // Weltposition
        let camAngle = 0;              // Blickrichtung in rad
        let fov = 70 * Math.PI/180;
        let scaleX = W / Math.tan(fov/2);
        let scaleY = H / Math.tan(fov/2);
        
        // Straßen-Geometrie (ZMap & Kurven)
        const ROAD_WIDTH = 3.2;
        const NUM_SEGMENTS = 160;      // Anzahl der 3D-Abschnitte (Z Tiefe)
        let segments = [];
        
        // ZMap: Für jede Bildschirmzeile den Z-Wert vorbereiten (spart Division pro Objekt)
        let zMap = new Array(H);
        function buildZMap() {
            for (let y = 0; y < H; y++) {
                // Projektion umkehren: z = scaleY * worldY / (screenY - H/2)
                // Hier worldY = 0 (Straßenhöhe) ? Wir berechnen stattdessen den Z-Wert für die untere Kante.
                // Vereinfacht: Z-Wert für Linie y (von unten nach oben)
                let screenY = H - y;    // 0 = unten
                if (screenY <= H/2) zMap[y] = 1000;
                else {
                    let t = (screenY - H/2) / (H/2);
                    zMap[y] = 50 / t;    // 50 = maximale Tiefe
                    if(zMap[y] > 400) zMap[y] = 400;
                }
            }
        }
        buildZMap();
        
        // Strecken-Daten (Kurven, Höhen, Items)
        function buildSegments() {
            for(let i=0; i<NUM_SEGMENTS; i++) {
                let t = i / NUM_SEGMENTS;
                let curve = 0;
                // Sinus-Kurven für Abwechslung
                if(t > 0.2 && t < 0.4) curve = 0.9 * Math.sin((t-0.2)*20);
                else if(t > 0.55 && t < 0.75) curve = -0.7 * Math.sin((t-0.55)*18);
                else if(t > 0.85) curve = 0.4 * Math.sin((t-0.85)*30);
                let yOffset = 0; // keine Höhen (flach)
                let itemType = null;
                if(i % 18 === 5 && i > 10) itemType = 'random';
                segments.push({
                    z: i * 1.5,          // Tiefe (virtuell)
                    curve: curve,
                    yOffset: yOffset,
                    item: itemType,
                    color: (Math.floor(i/8) % 2 === 0) ? '#3a6b3a' : '#2a5a2a'
                });
            }
        }
        buildSegments();
        
        // ---------- FAHRER & ITEMS ----------
        let player = {
            x: 0,                // Straßenposition (-1..1)
            speed: 0,
            maxSpeed: 13.2,
            acc: 0.28,
            turnSpeed: 2.6,
            drift: false,
            driftTimer: 0,
            driftBoost: false,
            lap: 0,
            currentItem: null,
            finishTime: null
        };
        
        let raceActive = true;
        let raceTimer = 0;
        let totalLaps = 3;
        
        // KI-Gegner (einfach, fahren auf festen Pfaden)
        let kies = [
            { x: 0.3, z: 25, speed: 4.2, item: null, cooldown: 0, color: '#44aa44' },
            { x: -0.2, z: 42, speed: 4.7, item: null, cooldown: 0, color: '#4488ff' },
            { x: 0.5, z: 60, speed: 3.9, item: null, cooldown: 0, color: '#aa44aa' }
        ];
        
        // Dynamische Items auf der Straße (Bananen, Panzer)
        let roadItems = [];   // { type, z, x, life }
        
        // Hilfsfunktionen
        function getSegmentAtZ(zWorld) {
            for(let i=0; i<segments.length-1; i++) {
                if(zWorld >= segments[i].z && zWorld < segments[i+1].z) return segments[i];
            }
            return segments[segments.length-1];
        }
        
        // Welt zu Screen (projiziert X, Y)
        function project(worldX, worldY, worldZ) {
            if(worldZ <= 0.5) return null;
            let xScreen = (worldX * scaleX) / worldZ + W/2;
            let yScreen = H/2 - (worldY * scaleY) / worldZ;
            return { x: xScreen, y: yScreen, scale: scaleX / worldZ };
        }
        
        // ----- STRAßEN RENDERN (Painter's Algorithm)-----
        function renderRoad() {
            // zeichne von fern nach nah (große Z zu kleiner Z)
            for(let i=segments.length-1; i>=0; i--) {
                let seg = segments[i];
                let zSeg = seg.z + 0.01;
                if(zSeg < 0.5) continue;
                // Straßenbreite in Welt
                let worldLeft = -ROAD_WIDTH/2 + player.x * 1.8;  // Spieler beeinflusst Kurve
                let worldRight = ROAD_WIDTH/2 + player.x * 1.8;
                // Krümmung einfließen lassen (pro Segment)
                let curveOffset = seg.curve * (zSeg / 80);
                worldLeft += curveOffset;
                worldRight += curveOffset;
                
                // Projektion
                let leftProj = project(worldLeft, 0, zSeg);
                let rightProj = project(worldRight, 0, zSeg);
                if(!leftProj || !rightProj) continue;
                
                // Farben
                let roadColor = seg.color;
                let topY = leftProj.y;
                let bottomY = (i>0) ? project(worldLeft, 0, segments[i-1].z+0.1)?.y : H;
                if(bottomY === undefined) bottomY = H;
                // Begrenzung
                let y1 = Math.max(0, Math.min(H, topY));
                let y2 = Math.max(0, Math.min(H, bottomY));
                if(y1 >= y2) continue;
                
                // Polygon zeichnen (Trapez)
                let x1l = leftProj.x, x1r = rightProj.x;
                let x2l = project(worldLeft + curveOffset*0.9, 0, segments[i-1]?.z+0.1)?.x || x1l;
                let x2r = project(worldRight + curveOffset*0.9, 0, segments[i-1]?.z+0.1)?.x || x1r;
                ctx.beginPath();
                ctx.moveTo(x1l, y1);
                ctx.lineTo(x1r, y1);
                ctx.lineTo(x2r, y2);
                ctx.lineTo(x2l, y2);
                ctx.fillStyle = roadColor;
                ctx.fill();
                ctx.strokeStyle = '#ddcc88';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // Fahrbahnmarkierung (Mitte)
                let midX = (x1l + x1r)/2;
                ctx.beginPath();
                ctx.moveTo(midX, y1);
                let midX2 = (x2l + x2r)/2;
                ctx.lineTo(midX2, y2);
                ctx.strokeStyle = '#ffdd99';
                ctx.setLineDash([8, 12]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }
        
        // Items & Gegner rendern (Sprite-Skalierung)
        function renderSprites() {
            let sprites = [];
            // Gegner
            for(let ki of kies) {
                let z = ki.z - camZoffset();
                if(z > 0.8 && z < 150) {
                    let worldX = ki.x * 1.2;
                    let proj = project(worldX, 0.2, z);
                    if(proj) sprites.push({ type: 'ki', color: ki.color, proj, z, kiRef: ki });
                }
            }
            // Items auf Straße
            for(let it of roadItems) {
                let z = it.z - camZoffset();
                if(z > 0.5 && z < 130) {
                    let proj = project(it.x, 0.1, z);
                    if(proj) sprites.push({ type: it.type, proj, z, data: it });
                }
            }
            // nach Z sortieren (fern zu nah)
            sprites.sort((a,b)=>b.z - a.z);
            for(let s of sprites) {
                let size = 0.7 * (scaleX / s.z);
                let x = s.proj.x - size/2;
                let y = s.proj.y - size/2;
                if(s.type === 'ki') {
                    ctx.fillStyle = s.color;
                    ctx.shadowBlur = 8;
                    ctx.fillRect(x, y, size, size*0.8);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x+size*0.2, y+size*0.2, size*0.2, size*0.2);
                    ctx.fillRect(x+size*0.6, y+size*0.2, size*0.2, size*0.2);
                } else if(s.type === 'banana') {
                    ctx.fillStyle = '#f5bc42';
                    ctx.beginPath();
                    ctx.ellipse(x+size/2, y+size/2, size/2, size/3, 0, 0, 2*Math.PI);
                    ctx.fill();
                } else if(s.type === 'mushroom') {
                    ctx.fillStyle = '#dd3333';
                    ctx.fillRect(x+size*0.3, y, size*0.4, size*0.6);
                    ctx.fillStyle = '#fff0c0';
                    ctx.fillRect(x+size*0.4, y-size*0.2, size*0.2, size*0.3);
                } else if(s.type === 'shell') {
                    ctx.fillStyle = '#33cc99';
                    ctx.beginPath();
                    ctx.ellipse(x+size/2, y+size/2, size/2, size/2, 0, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
        }
        
        // Aktuelle Z-Position des Spielers (basierend auf Speed)
        let playerZ = 5;
        function camZoffset() { return playerZ; }
        
        // Spieler-Update (Physik)
        let steerInput = 0;
        let driftPressed = false;
        
        function updatePlayer(dt) {
            if(!raceActive) return;
            // Beschleunigung
            if(player.speed < player.maxSpeed) player.speed += player.acc * dt;
            else player.speed = player.maxSpeed;
            // Lenkung
            let turn = steerInput * player.turnSpeed * (player.speed/player.maxSpeed) * dt;
            player.x += turn;
            player.x = Math.min(0.9, Math.max(-0.9, player.x));
            // Drift
            if(driftPressed && player.speed > 3) {
                player.drift = true;
                player.driftTimer += dt;
                let fill = Math.min(1, player.driftTimer/0.65)*100;
                document.getElementById('boostFill').style.width = fill+'%';
                if(player.driftTimer >= 0.65 && !player.driftBoost) player.driftBoost = true;
                // Extra Lenkung während Drift
                player.x += steerInput * 0.9 * dt;
                player.x = Math.min(0.95, Math.max(-0.95, player.x));
            } else if(player.drift) {
                if(player.driftBoost) {
                    player.speed += 8;
                    player.driftBoost = false;
                }
                player.drift = false;
                player.driftTimer = 0;
                document.getElementById('boostFill').style.width = '0%';
            }
            // Vorwärtsbewegung
            playerZ += player.speed * dt;
            // Rundenlogik (einfach: wenn Z > maxSegmentZ, Runde+1)
            let maxZ = segments[segments.length-1].z;
            if(playerZ > maxZ) {
                playerZ -= maxZ;
                player.lap++;
                if(player.lap >= totalLaps) {
                    raceActive = false;
                    document.getElementById('victoryOverlay').classList.add('show');
                }
            }
            raceTimer += dt;
            updateUI();
        }
        
        // KI bewegen
        function updateKI(dt) {
            for(let ki of kies) {
                ki.z += ki.speed * dt;
                if(ki.z > segments[segments.length-1].z) ki.z -= segments[segments.length-1].z;
                // Items nutzen (einfach)
                if(ki.item && ki.cooldown <= 0) {
                    if(ki.item === 'banana') {
                        roadItems.push({ type: 'banana', z: ki.z - 3, x: ki.x, life: 8 });
                    } else if(ki.item === 'shell') {
                        roadItems.push({ type: 'shell', z: ki.z - 1, x: ki.x, life: 5 });
                    }
                    ki.item = null;
                    ki.cooldown = 2.5;
                }
                if(ki.cooldown > 0) ki.cooldown -= dt;
                // Item-Boxen sammeln (Segment nahe)
                let seg = getSegmentAtZ(ki.z);
                if(seg && seg.item === 'random' && Math.random()<0.02) {
                    ki.item = Math.random()<0.5 ? 'banana' : 'shell';
                    seg.item = null;
                }
            }
        }
        
        // Kollisionen & Items des Spielers
        function updateItemsAndCollisions(dt) {
            // Spieler sammelt Item-Box
            let seg = getSegmentAtZ(playerZ);
            if(seg && seg.item === 'random') {
                let r = Math.random();
                if(r<0.34) player.currentItem = 'mushroom';
                else if(r<0.67) player.currentItem = 'banana';
                else player.currentItem = 'shell';
                seg.item = null;
                let icon = player.currentItem === 'mushroom' ? '🍄' : (player.currentItem === 'banana' ? '🍌' : '🐚');
                document.getElementById('itemIcon').innerHTML = icon;
            }
            // Kollision mit Straßen-Items
            for(let i=0; i<roadItems.length; i++) {
                let it = roadItems[i];
                let distZ = Math.abs(it.z - playerZ);
                let distX = Math.abs(it.x - player.x);
                if(distZ < 1.2 && distX < 0.5) {
                    if(it.type === 'banana') player.speed *= 0.3;
                    if(it.type === 'shell') player.speed = 2;
                    roadItems.splice(i,1);
                    i--;
                }
            }
            // Kollision mit KI
            for(let ki of kies) {
                let dz = Math.abs(ki.z - playerZ);
                if(dz < 1.0 && Math.abs(ki.x - player.x) < 0.6) {
                    player.speed *= 0.5;
                }
            }
            // Items Leben verringern
            for(let i=0; i<roadItems.length; i++) {
                roadItems[i].life = (roadItems[i].life || 5) - dt;
                if(roadItems[i].life <= 0) roadItems.splice(i,1);
            }
        }
        
        function usePlayerItem() {
            if(!raceActive || !player.currentItem) return;
            if(player.currentItem === 'mushroom') {
                player.speed += 7;
                setTimeout(()=>{ if(raceActive) player.speed = Math.max(3, player.speed-7); }, 1800);
            } else if(player.currentItem === 'banana') {
                roadItems.push({ type: 'banana', z: playerZ - 2.5, x: player.x, life: 8 });
            } else if(player.currentItem === 'shell') {
                roadItems.push({ type: 'shell', z: playerZ - 0.5, x: player.x, life: 5 });
            }
            player.currentItem = null;
            document.getElementById('itemIcon').innerHTML = '📦';
        }
        
        // UI Update
        function updateUI() {
            document.getElementById('lap').innerText = player.lap;
            document.getElementById('timer').innerText = raceTimer.toFixed(1);
            // Position berechnen (gegen KI)
            let all = [{name:'player', z:playerZ}, ...kies.map((k,i)=>({name:`ki${i}`, z:k.z}))];
            all.sort((a,b)=>b.z - a.z);
            let pos = all.findIndex(p=>p.name==='player')+1;
            document.getElementById('position').innerText = pos;
        }
        
        // ---------- EINGABEN (Touch + Tastatur) ----------
        let steerValue = 0;
        function handleSteer(value) { steerValue = Math.min(1, Math.max(-1, value)); }
        // Tastatur
        window.addEventListener('keydown', (e)=>{
            if(e.key === 'ArrowLeft' || e.key === 'a') handleSteer(-1);
            if(e.key === 'ArrowRight' || e.key === 'd') handleSteer(1);
            if(e.key === ' ' || e.key === 'Shift') { driftPressed = true; e.preventDefault(); }
            if(e.key === 'e' || e.key === 'Control') { usePlayerItem(); e.preventDefault(); }
        });
        window.addEventListener('keyup', (e)=>{
            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowRight' || e.key === 'd') handleSteer(0);
            if(e.key === ' ' || e.key === 'Shift') { driftPressed = false; e.preventDefault(); }
        });
        // Touch Bereich für Lenkung
        const steerZone = document.getElementById('steerZone');
        let touchActive = false;
        steerZone.addEventListener('touchstart', (e)=>{ e.preventDefault(); touchActive=true; });
        steerZone.addEventListener('touchmove', (e)=>{
            if(!touchActive) return;
            let rect = steerZone.getBoundingClientRect();
            let touchX = e.touches[0].clientX - rect.left;
            let percent = (touchX / rect.width) * 2 - 1;
            handleSteer(Math.min(1, Math.max(-1, percent)));
        });
        steerZone.addEventListener('touchend', ()=>{ handleSteer(0); touchActive=false; });
        steerZone.addEventListener('mousedown', (e)=>{
            touchActive=true;
            let rect = steerZone.getBoundingClientRect();
            let mx = e.clientX - rect.left;
            let percent = (mx / rect.width)*2-1;
            handleSteer(percent);
        });
        window.addEventListener('mouseup', ()=>{ if(touchActive){ handleSteer(0); touchActive=false; } });
        
        document.getElementById('driftTouch').addEventListener('touchstart', (e)=>{ e.preventDefault(); driftPressed=true; });
        document.getElementById('driftTouch').addEventListener('touchend', (e)=>{ e.preventDefault(); driftPressed=false; });
        document.getElementById('driftTouch').addEventListener('mousedown', ()=>{ driftPressed=true; });
        document.getElementById('driftTouch').addEventListener('mouseup', ()=>{ driftPressed=false; });
        
        document.getElementById('itemTouch').addEventListener('click', ()=>usePlayerItem());
        document.getElementById('itemTouch').addEventListener('touchstart', (e)=>{ e.preventDefault(); usePlayerItem(); });
        
        // ----- GAME LOOP (Software Render)-----
        let lastTime = performance.now();
        function gameLoop() {
            let now = performance.now();
            let dt = Math.min(0.033, (now - lastTime)/1000);
            lastTime = now;
            if(raceActive) {
                updatePlayer(dt);
                updateKI(dt);
                updateItemsAndCollisions(dt);
            }
            // Rendern
            ctx.clearRect(0,0,W,H);
            // Himmel
            ctx.fillStyle = '#0a2f3a';
            ctx.fillRect(0,0,W,H/2);
            ctx.fillStyle = '#5d8c6b';
            ctx.fillRect(0,H/2,W,H/2);
            renderRoad();
            renderSprites();
            // UI Text im Canvas (optional)
            ctx.font = "bold 16 monospace";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 0;
            requestAnimationFrame(gameLoop);
        }
        
        // Initialisierung
        playerZ = 5;
        player.lap = 0;
        raceActive = true;
        raceTimer = 0;
        gameLoop();
    })();
</script>
</body>
</html>
