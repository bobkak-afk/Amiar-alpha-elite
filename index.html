<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AMIAR KEMPF | SCUDERIA INFINITY</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ferrari-red: #cc0000;
            --gold-gradient: linear-gradient(135deg, #d4af37, #f7ef8a, #ae8625);
            --carbon: #050505;
            --glass: rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--carbon); color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; height: 100vh; }

        /* --- HUD (HEAD-UP DISPLAY) --- */
        #hud {
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 100; pointer-events: none;
        }
        .glass-panel {
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 12px 20px; border-radius: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand-text { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #speedo {
            position: absolute; bottom: 40px; right: 30px; width: 100px; height: 100px;
            border: 3px solid rgba(212, 175, 55, 0.3); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--glass); z-index: 100;
        }
        .speed-num { font-family: 'Orbitron'; font-size: 1.8rem; color: #f7ef8a; }

        /* --- CONTROLS --- */
        #ui-controls {
            position: absolute; bottom: 40px; left: 20px; display: flex; gap: 15px; z-index: 100;
        }
        .btn-action {
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid rgba(212, 175, 55, 0.4);
            background: var(--glass); color: white; font-weight: 800; cursor: pointer; pointer-events: auto;
        }
        .btn-action:active { transform: scale(0.9); border-color: #f7ef8a; }
        .btn-boost { background: var(--gold-gradient); color: black; border: none; }

        /* --- SCREENS --- */
        .overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .start-btn {
            background: var(--gold-gradient); border: none; padding: 18px 50px;
            border-radius: 50px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; font-size: 1.2rem; margin-top: 30px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        #drift-bar {
            position: absolute; bottom: 130px; left: 25px; width: 140px; height: 4px;
            background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
        }
        #drift-fill { width: 0%; height: 100%; background: #f7ef8a; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h1 class="brand-text" style="font-size: 2.5rem;">SCUDERIA INFINITY</h1>
        <p style="opacity: 0.5; letter-spacing: 5px; margin-top: 5px;">BY AMIAR KEMPF & WOWA</p>
        <button class="start-btn" onclick="initGame()">MOTOR STARTEN</button>
        <div style="margin-top: 40px; font-size: 0.7rem; opacity: 0.3;">WEBGL ENGINE V3.0 PLATINUM</div>
    </div>

    <div id="hud">
        <div class="glass-panel">
            <div class="brand-text" style="font-size: 0.8rem;">SCUDERIA VELOCITY</div>
            <div id="lap-info" style="font-size: 0.7rem; opacity: 0.6;">RUNDE 1 / 3</div>
        </div>
        <div class="glass-panel">
            <div id="timer" style="font-family: 'Orbitron'; color: #f7ef8a;">00:00</div>
        </div>
    </div>

    <div id="drift-bar"><div id="drift-fill"></div></div>

    <div id="ui-controls">
        <button class="btn-action btn-boost" id="btn-item">ITEM</button>
        <button class="btn-action" id="btn-drift">DRIFT</button>
    </div>

    <div id="speedo">
        <div class="speed-num" id="speed-val">0</div>
        <div style="font-size: 0.5rem; opacity: 0.5; letter-spacing: 1px;">KM/H</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.150.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, car, clock;
        let speed = 0, rotation = 0, steer = 0, driftPower = 0;
        let isDrifting = false, gameActive = false, startTime;

        const settings = { accel: 0.006, decel: 0.003, maxSpeed: 0.8, turn: 0.04 };

        function setup() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 30, 80);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Light
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xd4af37, 1.2);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Road & World
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.2 })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const trackGeo = new THREE.RingGeometry(55, 65, 64);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.1 });
            const track = new THREE.Mesh(trackGeo, trackMat);
            track.rotation.x = -Math.PI / 2;
            track.position.y = 0.02;
            scene.add(track);

            // Luxury Car
            car = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 0.5, 2.5),
                new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.9, roughness: 0.1 })
            );
            body.position.y = 0.4;
            car.add(body);
            
            const neon = new THREE.PointLight(0xd4af37, 2, 4);
            neon.position.y = 0.2;
            car.add(neon);

            scene.add(car);
            
            window.addEventListener('resize', onResize);
            loop();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // UI Controls
        const driftBtn = document.getElementById('btn-drift');
        driftBtn.onpointerdown = () => isDrifting = true;
        driftBtn.onpointerup = () => {
            if(driftPower > 70) speed += 0.3; // Mini-Turbo
            isDrifting = false;
        };

        function loop() {
            requestAnimationFrame(loop);
            if (!gameActive) return;

            // Physics
            if (keys['ArrowUp'] || keys['KeyW']) speed += settings.accel;
            else speed -= settings.decel;
            speed = Math.max(0, Math.min(speed, settings.maxSpeed));

            if (keys['ArrowLeft'] || keys['KeyA']) steer = THREE.MathUtils.lerp(steer, 1, 0.1);
            else if (keys['ArrowRight'] || keys['KeyD']) steer = THREE.MathUtils.lerp(steer, -1, 0.1);
            else steer = THREE.MathUtils.lerp(steer, 0, 0.1);

            if (isDrifting && speed > 0.2) {
                driftPower = Math.min(100, driftPower + 1.5);
                rotation += steer * settings.turn * 1.6;
            } else {
                rotation += steer * settings.turn * (speed * 2);
                driftPower = Math.max(0, driftPower - 2);
            }

            car.position.x += Math.sin(rotation) * speed;
            car.position.z += Math.cos(rotation) * speed;
            car.rotation.y = rotation;
            car.rotation.z = -steer * 0.1;

            // Camera
            const offset = new THREE.Vector3(-Math.sin(rotation) * 7, 3.5, -Math.cos(rotation) * 7);
            camera.position.lerp(car.position.clone().add(offset), 0.1);
            camera.lookAt(car.position);

            // UI Updates
            document.getElementById('speed-val').innerText = Math.floor(speed * 380);
            document.getElementById('drift-fill').style.width = driftPower + '%';
            
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('timer').innerText = `00:${elapsed.toString().padStart(2, '0')}`;

            renderer.render(scene, camera);
        }

        window.initGame = () => {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                gameActive = true;
                startTime = Date.now();
            }, 500);
        };

        setup();
    </script>
</body>
</html>
