<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMIAR KEMPF | SCUDERIA INFINITY 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #d4af37, #f7ef8a, #ae8625);
            --red: #cc0000;
            --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(212, 175, 55, 0.3);
        }

        body { margin: 0; overflow: hidden; background: #000; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }

        /* Luxus HUD */
        #hud-top {
            position: absolute; top: 40px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; z-index: 100;
            pointer-events: none;
        }
        .glass-panel {
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .brand { font-family: 'Orbitron'; font-weight: 900; letter-spacing: 4px; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Speedometer */
        #speedo {
            position: absolute; bottom: 40px; right: 30px; width: 120px; height: 120px;
            border: 4px solid var(--border); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--glass); z-index: 100;
        }
        .speed-val { font-family: 'Orbitron'; font-size: 28px; font-weight: 900; color: #f7ef8a; }

        /* Controls */
        #controls {
            position: absolute; bottom: 40px; left: 30px;
            display: flex; gap: 20px; align-items: center; z-index: 100;
        }
        .btn-circle {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border);
            background: var(--glass); color: white; font-weight: 900; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.2s; pointer-events: auto;
        }
        .btn-circle:active { transform: scale(0.9); border-color: #f7ef8a; }
        .btn-item { background: var(--gold); color: black; border: none; }

        #steering-wheel {
            width: 150px; height: 150px; border: 8px solid var(--border);
            border-radius: 50%; transition: transform 0.1s; pointer-events: auto;
        }

        #drift-bar {
            position: absolute; bottom: 170px; left: 30px; width: 150px; height: 6px;
            background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
        }
        #drift-fill { width: 0%; height: 100%; background: var(--gold); transition: width 0.1s; }

        /* Overlay */
        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .start-btn {
            background: var(--gold); border: none; padding: 20px 60px;
            border-radius: 50px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; font-size: 20px; margin-top: 30px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="brand" style="font-size: 40px;">SCUDERIA INFINITY</h1>
        <p style="opacity: 0.6; letter-spacing: 2px;">PRODUZIERT VON WOWA & AMIAR KEMPF</p>
        <button class="start-btn" onclick="startRace()">START MISSION</button>
    </div>

    <div id="hud-top">
        <div class="glass-panel">
            <div class="brand">AMIAR KEMPF</div>
            <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">VELOCITY EDITION</div>
        </div>
        <div class="glass-panel" style="text-align: right;">
            <div id="lap-display">RUNDE 1 / 3</div>
            <div id="pos-display" style="color: #f7ef8a; font-weight: 800;">POS: 1 / 4</div>
        </div>
    </div>

    <div id="drift-bar"><div id="drift-fill"></div></div>

    <div id="controls">
        <input type="range" id="steer-input" min="-1" max="1" step="0.1" value="0" style="display:none">
        <div id="steering-wheel" style="background: radial-gradient(circle, transparent 40%, rgba(212,175,55,0.1) 100%);"></div>
        <button class="btn-circle btn-item" id="item-trigger">ITEM</button>
        <button class="btn-circle" id="drift-trigger">DRIFT</button>
    </div>

    <div id="speedo">
        <div class="speed-val" id="speed-val">0</div>
        <div style="font-size: 10px; opacity: 0.5;">KM/H</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.150.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- KONFIGURATION ---
        let scene, camera, renderer, playerCar, clock;
        let speed = 0, rotation = 0, steer = 0;
        let isDrifting = false, driftPower = 0;
        let currentLap = 1, raceActive = false;
        
        const config = {
            maxSpeed: 0.8,
            accel: 0.005,
            decel: 0.002,
            turnSpeed: 0.04
        };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 40, 90);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Licht
            const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
            scene.add(hemi);
            const sun = new THREE.DirectionalLight(0xd4af37, 1.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            createTrack();
            createPlayer();
            animate();
        }

        function createTrack() {
            // Boden mit Carbon-Gitter-Struktur
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ 
                color: 0x111111, 
                roughness: 0.2, 
                metalness: 0.5 
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Rennstrecke (Glänzender Asphalt)
            const trackPath = new THREE.Shape();
            trackPath.absellipse(0, 0, 60, 40, 0, Math.PI * 2, false);
            const trackGeo = new THREE.ExtrudeGeometry(trackPath, { depth: 0.1, bevelEnabled: false });
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1 });
            const track = new THREE.Mesh(trackGeo, trackMat);
            track.rotation.x = -Math.PI / 2;
            track.position.y = 0.01;
            scene.add(track);

            // Goldene Leitlinien
            const lineGeo = new THREE.RingGeometry(59.5, 60.5, 64);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xd4af37 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.y = 0.05;
            scene.add(line);
        }

        function createPlayer() {
            playerCar = new THREE.Group();
            
            // Karosserie (Luxus Sportwagen Form)
            const bodyGeo = new THREE.BoxGeometry(1.2, 0.5, 2.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.9, roughness: 0.1 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            playerCar.add(body);

            // Glas
            const glassGeo = new THREE.BoxGeometry(1.0, 0.4, 1.0);
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0 });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.set(0, 0.7, 0.2);
            playerCar.add(glass);

            // Unterbodenbeleuchtung (Neon Gold)
            const neon = new THREE.PointLight(0xd4af37, 2, 5);
            neon.position.y = 0.1;
            playerCar.add(neon);

            scene.add(playerCar);
        }

        // Steuerung Logic
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function updatePhysics() {
            if(!raceActive) return;

            // Gas / Bremse
            if(keys['ArrowUp'] || keys['KeyW']) speed += config.accel;
            else speed -= config.decel;

            speed = Math.max(0, Math.min(speed, config.maxSpeed));

            // Lenkung
            if(keys['ArrowLeft'] || keys['KeyA']) steer = THREE.MathUtils.lerp(steer, 1, 0.1);
            else if(keys['ArrowRight'] || keys['KeyD']) steer = THREE.MathUtils.lerp(steer, -1, 0.1);
            else steer = THREE.MathUtils.lerp(steer, 0, 0.1);

            // Drift Logic
            if(isDrifting && speed > 0.3) {
                driftPower = THREE.MathUtils.lerp(driftPower, 100, 0.02);
                rotation += steer * config.turnSpeed * 1.5;
            } else {
                rotation += steer * config.turnSpeed * (speed * 2);
                driftPower = THREE.MathUtils.lerp(driftPower, 0, 0.1);
            }

            // Bewegung anwenden
            playerCar.position.x += Math.sin(rotation) * speed;
            playerCar.position.z += Math.cos(rotation) * speed;
            playerCar.rotation.y = rotation;
            
            // Rad-Neigung (Visual)
            playerCar.rotation.z = -steer * 0.1;

            // Kamera-Follow (Smooth)
            const camOffset = new THREE.Vector3(-Math.sin(rotation) * 8, 4, -Math.cos(rotation) * 8);
            camera.position.lerp(playerCar.position.clone().add(camOffset), 0.1);
            camera.lookAt(playerCar.position);

            // UI Update
            document.getElementById('speed-val').innerText = Math.floor(speed * 400);
            document.getElementById('drift-fill').style.width = driftPower + '%';
            document.getElementById('steering-wheel').style.transform = `rotate(${-steer * 45}deg)`;
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            renderer.render(scene, camera);
        }

        // Mobile Controls
        const driftBtn = document.getElementById('drift-trigger');
        driftBtn.onpointerdown = () => isDrifting = true;
        driftBtn.onpointerup = () => {
            if(driftPower > 80) speed += 0.3; // Boost
            isDrifting = false;
        };

        window.startRace = () => {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'none';
                raceActive = true;
            }, 500);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
