<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMIAR KEMPF | SCUDERIA INFINITY 3D</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Barlow+Condensed:ital,wght@1,900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ferrari-red: #cc0000;
            --gold: #ffcf40;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Barlow Condensed', sans-serif; overflow: hidden; touch-action: none; }
        
        body { background: #000; color: white; height: 100vh; display: flex; justify-content: center; }

        /* --- 3D CANVAS --- */
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- UI OVERLAY --- */
        .ui-layer {
            position: relative; z-index: 10; width: 100%; max-width: 500px; height: 100vh;
            display: flex; flex-direction: column; pointer-events: none;
        }
        .ui-layer > * { pointer-events: auto; }

        .header {
            padding: 50px 30px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .brand { font-style: italic; font-size: 1.8rem; letter-spacing: -1px; }
        .brand span { color: var(--ferrari-red); }

        /* --- HUD --- */
        .hud {
            position: absolute; top: 120px; width: 100%; text-align: center;
        }
        .speed-box {
            display: inline-block; padding: 10px 30px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; backdrop-filter: blur(10px);
        }
        .speed-num { font-family: 'Orbitron'; font-size: 2rem; color: var(--gold); }
        .kmh { font-size: 0.7rem; letter-spacing: 3px; color: #888; margin-top: -5px; }

        /* --- CONTROLS --- */
        .controls {
            margin-top: auto; height: 180px; display: flex; justify-content: space-around; align-items: center;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding-bottom: 30px;
        }
        .btn-ctrl {
            width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--ferrari-red);
            background: rgba(0,0,0,0.5); color: white; font-size: 2rem; display: flex;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(204, 0, 0, 0.2);
        }
        .btn-ctrl:active { background: var(--ferrari-red); transform: scale(0.9); }

        /* --- SCREENS --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 40px; text-align: center;
        }
        .title-3d { font-size: 3rem; font-style: italic; color: var(--ferrari-red); margin-bottom: 10px; }
        .btn-start {
            background: var(--ferrari-red); border: none; padding: 20px 50px; color: white;
            font-size: 1.5rem; font-weight: 900; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            margin-top: 30px; cursor: pointer;
        }

        .credits {
            position: absolute; bottom: 200px; width: 100%; text-align: center;
            font-size: 0.6rem; letter-spacing: 4px; color: #444; text-transform: uppercase;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div class="ui-layer">
    <header class="header">
        <div class="brand">AMIAR <span>KEMPF</span></div>
        <div style="font-family: Orbitron; font-size: 0.6rem; color: #555;">V.3.0 PLATINUM</div>
    </header>

    <div class="hud">
        <div class="speed-box">
            <div class="speed-num" id="speedDisplay">0</div>
            <div class="kmh">KM/H VELOCITY</div>
        </div>
    </div>

    <div class="credits">Produziert von Wowa & Amiar Kempf</div>

    <div class="controls">
        <div class="btn-ctrl" id="leftBtn">◀</div>
        <div class="btn-ctrl" id="rightBtn">▶</div>
    </div>

    <div id="startScreen" class="overlay">
        <h1 class="title-3d">INFINITY 3D</h1>
        <p style="opacity: 0.5;">Weiche den Sektoren aus • Sammle die Gold-Energie</p>
        <button class="btn-start" onclick="startGame()">MISSION STARTEN</button>
    </div>

    <div id="gameOver" class="overlay" style="display: none;">
        <h1 class="title-3d">ZIEL ERREICHT</h1>
        <p style="opacity: 0.5;">Deine Höchstgeschwindigkeit:</p>
        <h2 id="finalSpeed" style="font-family: Orbitron; font-size: 4rem; color: var(--gold);">0</h2>
        <button class="btn-start" onclick="location.reload()">NEUSTART</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, car, road, particles;
    let obstacles = [], items = [];
    let speed = 0, targetX = 0, score = 0;
    let gameActive = false;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // Beleuchtung
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const point = new THREE.PointLight(0xcc0000, 2, 50);
        point.position.set(0, 5, 5);
        scene.add(point);

        // Das Auto (Ferrari Style 3D Mesh)
        const body = new THREE.BoxGeometry(1.2, 0.6, 2.5);
        const mat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.8, roughness: 0.2 });
        car = new THREE.Mesh(body, mat);
        car.position.y = 0.3;
        scene.add(car);

        // Cockpit-Glas
        const glassGeo = new THREE.BoxGeometry(1, 0.4, 0.8);
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.8 });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.set(0, 0.4, 0.2);
        car.add(glass);

        // Straße
        const roadGeo = new THREE.PlaneGeometry(15, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Sterne / Partikel
        const partGeo = new THREE.BufferGeometry();
        const partCount = 1000;
        const posArr = new Float32Array(partCount * 3);
        for(let i=0; i<partCount*3; i++) posArr[i] = (Math.random()-0.5) * 100;
        partGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        particles = new THREE.Points(partGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
        scene.add(particles);

        camera.position.set(0, 3, 7);
        camera.lookAt(0, 0, 0);
    }

    function spawnEntity() {
        if (!gameActive) return;
        
        // Hindernisse
        if (Math.random() < 0.05) {
            const obsGeo = new THREE.BoxGeometry(2, 2, 2);
            const obsMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const obs = new THREE.Mesh(obsGeo, obsMat);
            obs.position.set((Math.random()-0.5)*10, 1, -100);
            scene.add(obs);
            obstacles.push(obs);
        }

        // Gold Items
        if (Math.random() < 0.02) {
            const itemGeo = new THREE.TorusGeometry(0.5, 0.2, 16, 32);
            const itemMat = new THREE.MeshStandardMaterial({ color: 0xffcf40, emissive: 0xffcf40, emissiveIntensity: 0.5 });
            const item = new THREE.Mesh(itemGeo, itemMat);
            item.position.set((Math.random()-0.5)*10, 1, -100);
            scene.add(item);
            items.push(item);
        }
    }

    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        gameActive = true;
        animate();
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('gameOver').style.display = 'flex';
        document.getElementById('finalSpeed').innerText = Math.floor(score);
    }

    // Steuerung
    let moveDir = 0;
    document.getElementById('leftBtn').onpointerdown = () => moveDir = 5;
    document.getElementById('rightBtn').onpointerdown = () => moveDir = -5;
    document.getElementById('leftBtn').onpointerup = document.getElementById('rightBtn').onpointerup = () => moveDir = 0;

    function animate() {
        if (!gameActive) return;
        requestAnimationFrame(animate);

        // Auto Bewegung
        car.position.x += (targetX - car.position.x) * 0.1;
        targetX += moveDir * 0.05;
        targetX = Math.max(-6, Math.min(6, targetX));
        car.rotation.z = -(targetX - car.position.x) * 0.5; // Neigung in Kurven

        // Welt Bewegung
        obstacles.forEach((o, i) => {
            o.position.z += 1.5 + (score/1000);
            // Kollision
            if (Math.abs(o.position.z - car.position.z) < 1.5 && Math.abs(o.position.x - car.position.x) < 1.5) {
                gameOver();
            }
            if (o.position.z > 10) { scene.remove(o); obstacles.splice(i, 1); }
        });

        items.forEach((item, i) => {
            item.position.z += 1.2;
            item.rotation.y += 0.1;
            // Sammeln
            if (Math.abs(item.position.z - car.position.z) < 1.5 && Math.abs(item.position.x - car.position.x) < 1.5) {
                scene.remove(item);
                items.splice(i, 1);
                score += 500;
            }
        });

        score += 1;
        document.getElementById('speedDisplay').innerText = Math.floor(score / 10);
        
        spawnEntity();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    init3D();
</script>
</body>
</html>
