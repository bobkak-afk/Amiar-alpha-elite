<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SCUDERIA ARCHITECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #030303; --accent: #ff003c; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* --- PRESTIGE NEOMORPHIC MENU --- */
        #menu {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 1.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .luxury-frame {
            border: 1px solid rgba(212, 175, 55, 0.2); padding: 60px;
            background: rgba(255,255,255,0.02); backdrop-filter: blur(20px);
            border-radius: 2px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }
        .title { font-family: 'Syncopate'; font-weight: 700; font-size: 2.5rem; letter-spacing: 20px; 
                  background: linear-gradient(to bottom, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .author { font-size: 0.6rem; letter-spacing: 10px; margin-top: 20px; color: var(--gold); opacity: 0.6; text-transform: uppercase; }

        .btn-engage {
            margin-top: 50px; padding: 20px 50px; background: none; border: 1px solid var(--gold);
            color: #fff; font-family: 'Syncopate'; font-size: 0.8rem; letter-spacing: 5px;
            cursor: pointer; transition: 0.4s; position: relative;
        }
        .btn-engage:active { background: var(--gold); color: #000; }

        /* --- ARCHITECT HUD --- */
        #hud {
            position: absolute; inset: 0; pointer-events: none; z-index: 100; opacity: 0;
            padding: env(safe-area-inset-top) 40px; transition: opacity 2s;
        }
        .stat-group { position: absolute; }
        .top-left { top: 60px; left: 40px; }
        .top-right { top: 60px; right: 40px; text-align: right; }
        
        .val { font-family: 'Syncopate'; font-size: 1.8rem; font-weight: 700; color: #fff; }
        .lbl { font-size: 0.5rem; letter-spacing: 4px; color: var(--gold); margin-bottom: 5px; text-transform: uppercase; }

        .speed-display {
            position: absolute; bottom: 60px; right: 40px; display: flex; align-items: baseline;
        }
        #speed-num { font-family: 'Syncopate'; font-size: 5rem; font-weight: 700; line-height: 0.8; }
        .unit { font-size: 0.8rem; margin-left: 10px; color: var(--gold); font-weight: 400; }

        /* --- INTERACTION ZONES --- */
        .zone { position: absolute; top: 0; height: 100%; z-index: 50; }
        #L { left: 0; width: 35%; } #R { right: 0; width: 35%; } #G { left: 35%; width: 30%; }
        
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="menu">
        <div class="luxury-frame">
            <div class="title">SCUDERIA</div>
            <div class="author">Amiar Kempf Edition</div>
            <button class="btn-engage" onclick="igniteEngine()">IGNITION</button>
        </div>
    </div>

    <div id="hud">
        <div class="stat-group top-left">
            <div class="lbl">Sector Pilot</div>
            <div class="val" style="font-size: 1.2rem;">A. KEMPF</div>
        </div>
        <div class="stat-group top-right">
            <div class="lbl">Core Stability</div>
            <div id="timer" class="val" style="color: var(--accent);">30</div>
        </div>
        <div class="speed-display">
            <div id="speed-num">00</div>
            <div class="unit">KM/H</div>
        </div>
    </div>

    <div id="L" class="zone"></div><div id="G" class="zone"></div><div id="R" class="zone"></div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

        let scene, camera, renderer, car, grid, goal;
        let speed = 0, targetSpeed = 0, rotation = 0, timer = 30, distance = 0;
        let active = false, input = { l: false, r: false, g: false };
        let audioCtx, osc, gain;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            osc.type = 'sawtooth';
            gain = audioCtx.createGain();
            gain.gain.value = 0;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        function createArchitectCar() {
            const group = new THREE.Group();
            
            // Base Chassis (Carbon Dark)
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 1, roughness: 0.1 });
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.3, 3), bodyMat);
            chassis.position.y = 0.3;
            group.add(chassis);

            // Cockpit (Glass Pearl)
            const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x000000, metalness: 1, roughness: 0, transparent: true, opacity: 0.6, transmission: 0.5 });
            const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1.4), glassMat);
            cockpit.position.set(0, 0.6, 0.2);
            group.add(cockpit);

            // Neon Lights (Gold Emissive)
            const neonMat = new THREE.MeshBasicMaterial({ color: 0xd4af37 });
            const lightL = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.1), neonMat);
            lightL.position.set(0.4, 0.3, 1.5);
            group.add(lightL);
            const lightR = lightL.clone(); lightR.position.x = -0.4;
            group.add(lightR);

            // Rear Wing
            const wing = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, 0.5), bodyMat);
            wing.position.set(0, 0.7, -1.3);
            group.add(wing);

            return group;
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));
            const pLight = new THREE.PointLight(0xd4af37, 100, 50);
            pLight.position.set(0, 5, 5);
            scene.add(pLight);

            // Grid (The Architect Floor)
            grid = new THREE.GridHelper(3000, 100, 0xd4af37, 0x111111);
            scene.add(grid);

            car = createArchitectCar();
            scene.add(car);

            // Goal Torus
            goal = new THREE.Mesh(
                new THREE.TorusGeometry(10, 0.05, 16, 100),
                new THREE.MeshBasicMaterial({ color: 0xd4af37 })
            );
            goal.position.z = -200;
            scene.add(goal);

            // Input
            const t = (id, k) => {
                const el = document.getElementById(id);
                el.ontouchstart = (e) => { e.preventDefault(); input[k] = true; };
                el.ontouchend = () => input[k] = false;
            };
            t('L', 'l'); t('R', 'r'); t('G', 'g');

            animate();
            setInterval(() => { if(active && timer > 0) timer--; }, 1000);
        }

        function animate() {
            if(!active) return;
            requestAnimationFrame(animate);

            // Advanced Physics
            if(input.g) {
                targetSpeed = 1.2;
                gain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.1);
            } else {
                targetSpeed = 0;
                gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.3);
            }
            speed = THREE.MathUtils.lerp(speed, targetSpeed, 0.025);
            
            if(input.l) { rotation += 0.045; car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, 0.2, 0.1); }
            else if(input.r) { rotation -= 0.045; car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, -0.2, 0.1); }
            else { car.rotation.z = THREE.MathUtils.lerp(car.rotation.z, 0, 0.1); }

            car.position.x += Math.sin(rotation) * speed;
            car.position.z += Math.cos(rotation) * speed;
            car.rotation.y = rotation;
            distance += speed;

            osc.frequency.setTargetAtTime(30 + (speed * 200), audioCtx.currentTime, 0.1);

            // Checkpoint Logic
            if(car.position.distanceTo(goal.position) < 12) {
                timer += 10;
                goal.position.z -= 500;
                goal.position.x = car.position.x + (Math.random()-0.5)*150;
                document.getElementById('flash').style.opacity = 0.3;
                setTimeout(() => document.getElementById('flash').style.opacity = 0, 100);
            }

            // Cinematic Camera
            camera.fov = 55 + (speed * 45);
            camera.updateProjectionMatrix();
            const camOffset = new THREE.Vector3(-Math.sin(rotation)*10, 4.5, -Math.cos(rotation)*10);
            camera.position.lerp(car.position.clone().add(camOffset), 0.08);
            camera.lookAt(car.position.x, 1, car.position.z + Math.cos(rotation)*10);

            // HUD Sync
            document.getElementById('speed-num').innerText = Math.floor(speed * 425);
            document.getElementById('timer').innerText = timer;
            document.getElementById('timer').style.opacity = timer < 10 ? (Math.sin(Date.now()*0.01)*0.5+0.5) : 1;

            if(timer <= 0) location.reload();

            renderer.render(scene, camera);
        }

        window.igniteEngine = () => {
            initAudio(); setupScene();
            document.getElementById('menu').style.opacity = '0';
            document.getElementById('menu').style.transform = 'scale(1.2)';
            setTimeout(() => {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('hud').style.opacity = '1';
                active = true;
            }, 1500);
        };
    </script>
</body>
</html>
